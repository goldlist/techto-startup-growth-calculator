  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // Generate log-scale Y-axis ticks at 1× and 3× each decade
    function genFlowTicks(minF, maxF) {
      const ticks = [];
      for (let exp = 1; exp <= 9; exp++) {
        for (const base of [1, 3]) {
          const val = base * Math.pow(10, exp);
          if (val >= minF && val <= maxF) ticks.push(val);
        }
      }
      return ticks;
    }

    // Compute target log-scale range for auto-zoom (data occupies ~70% of chart)
    function computeTargetLogRange(rev0, exp0, expGrowth, growth) {
      const revEnd = rev0 * Math.pow(1 + growth, 36);
      const expEnd = exp0 * Math.pow(1 + expGrowth, 36);
      const rawMin = Math.min(rev0, exp0);
      const rawMax = Math.max(revEnd, expEnd);
      const safeMin = Math.max(rawMin, 100);
      const safeMax = Math.max(rawMax, safeMin * 2);
      const lMin = Math.log(safeMin);
      const lMax = Math.log(safeMax);
      const logRange = Math.max(lMax - lMin, 2);
      const pad = logRange * 0.15;
      return { lMin: lMin - pad, lMax: lMax + pad };
    }

    // ── Label placement helpers ──────────────────────────────────────────────────
    function rectOverlap(a, b, pad) {
      pad = (pad === undefined) ? 3 : pad;
      return !(a.x + a.w + pad < b.x || b.x + b.w + pad < a.x ||
               a.y + a.h + pad < b.y || b.y + b.h + pad < a.y);
    }
    function lblBox(tx, ty, text, fs, anchor) {
      const w = text.length * fs * 0.58 + 14;
      const h = fs * 1.5;
      const x = anchor === 'end' ? tx - w + 5 : anchor === 'middle' ? tx - w / 2 : tx - 4;
      return { x, y: ty - h * 0.78, w, h };
    }
    // Greedy placement: tries preferred position then 10 nudge candidates; clamps to chart
    function placeLabel(px, py, text, fs, anchor, placed, pL, pR, pT, pB) {
      const nudges = [[0,0],[0,-fs*2],[0,fs*2],[0,-fs*3.8],[0,fs*3.8],
                      [fs*4,0],[-fs*4,0],[fs*4,-fs*2],[-fs*4,-fs*2],[fs*4,fs*2],[-fs*4,fs*2]];
      for (const [dx, dy] of nudges) {
        let tx = px + dx, ty = py + dy;
        let bb = lblBox(tx, ty, text, fs, anchor);
        if (bb.x < pL + 2) { tx += pL + 2 - bb.x; bb = lblBox(tx, ty, text, fs, anchor); }
        if (bb.x + bb.w > pR - 2) { tx -= bb.x + bb.w - (pR - 2); bb = lblBox(tx, ty, text, fs, anchor); }
        if (bb.y < pT + 2) { ty += pT + 2 - bb.y; bb = lblBox(tx, ty, text, fs, anchor); }
        if (bb.y + bb.h > pB - 2) { ty -= bb.y + bb.h - (pB - 2); bb = lblBox(tx, ty, text, fs, anchor); }
        if (placed.every(p => !rectOverlap(p, bb, 3))) {
          placed.push(bb);
          return { x: tx, y: ty, box: bb };
        }
      }
      // Fallback: clamp and accept overlap
      const fb = lblBox(px, py, text, fs, anchor);
      fb.x = Math.max(pL + 2, Math.min(pR - fb.w - 2, fb.x));
      fb.y = Math.max(pT + 2, Math.min(pB - fb.h - 2, fb.y));
      placed.push(fb);
      return { x: px, y: py, box: fb };
    }
    // Renders text with a semi-transparent white background pill
    function LabelBg({ x, y, text, fontSize, fontFamily, fontWeight = 'normal', fill = '#000', anchor = 'start', transform }) {
      const w = text.length * fontSize * 0.58 + 14;
      const h = fontSize * 1.5;
      const rx = anchor === 'end' ? x - w + 5 : anchor === 'middle' ? x - w / 2 : x - 4;
      const ry = y - h * 0.78;
      return (
        <g style={{ pointerEvents: 'none' }} transform={transform}>
          <rect x={rx} y={ry} width={w} height={h} fill="rgba(255,255,255,0.75)" rx="2" />
          <text x={x} y={y} fontSize={fontSize} fontFamily={fontFamily}
            fontWeight={fontWeight} fill={fill} textAnchor={anchor} dominantBaseline="middle">
            {text}
          </text>
        </g>
      );
    }

    // ─── Faithful port of Trevor Blackwell's GrowthView.js ───────────────────────
    // Source: https://gitlab.com/tlb/startuptools
    // Trevor's chart uses HTML5 Canvas; this is an SVG port of his exact logic.

    function GrowthChart({ rev0, exp0, expGrowth, growth, onRev, onExp, onGrowth, summaryText, capitalNeeded }) {
      const svgRef = useRef(null);
      const containerRef = useRef(null);
      const dragging = useRef(null);
      const [, forceRender] = useState(0);
      const [containerW, setContainerW] = useState(() => typeof window !== 'undefined' ? window.innerWidth : 900);

      // ── Dynamic Y-axis auto-zoom ──────────────────────────────────────────
      const logMinRef = useRef(null);
      const logMaxRef = useRef(null);
      const rafRef = useRef(null);
      const initialized = useRef(false);
      if (!initialized.current) {
        initialized.current = true;
        const { lMin, lMax } = computeTargetLogRange(rev0, exp0, expGrowth, growth);
        logMinRef.current = lMin;
        logMaxRef.current = lMax;
      }

      useEffect(() => {
        const { lMin: tMin, lMax: tMax } = computeTargetLogRange(rev0, exp0, expGrowth, growth);
        if (rafRef.current) cancelAnimationFrame(rafRef.current);
        const factor = 0.12, tol = 0.002;
        function animate() {
          const dMin = tMin - logMinRef.current;
          const dMax = tMax - logMaxRef.current;
          if (Math.abs(dMin) < tol && Math.abs(dMax) < tol) {
            logMinRef.current = tMin;
            logMaxRef.current = tMax;
            forceRender(n => n + 1);
            rafRef.current = null;
            return;
          }
          logMinRef.current += dMin * factor;
          logMaxRef.current += dMax * factor;
          forceRender(n => n + 1);
          rafRef.current = requestAnimationFrame(animate);
        }
        rafRef.current = requestAnimationFrame(animate);
      }, [rev0, exp0, expGrowth, growth]);

      useEffect(() => () => { if (rafRef.current) cancelAnimationFrame(rafRef.current); }, []);

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const ro = new ResizeObserver(entries => setContainerW(entries[0].contentRect.width));
        ro.observe(el);
        return () => ro.disconnect();
      }, []);

      // Layout — mobile-responsive
      const isMobile = containerW < 640;
      const W = isMobile ? 500 : 900;
      const H = isMobile ? 540 : 500;
      const labelW = isMobile ? 56 : 72;
      const plotL = 5 + labelW;
      const plotR = W - (isMobile ? 12 : 20);
      const plotT = isMobile ? 38 : 45;
      const plotB = H - (isMobile ? 38 : 35);
      const dragRad = isMobile ? 13 : 7;
      const hitRad = isMobile ? 26 : dragRad;
      // Font sizes — scaled so rendered CSS pixels stay consistent across viewBox sizes
      const fsAxis = isMobile ? 15 : 11;
      const fsXLabel = isMobile ? 16 : 12;
      const fsAnnot = isMobile ? 18 : 13;
      const fsCapLabel = isMobile ? 19 : 14;
      const fsProt = isMobile ? 15 : 11;
      const charW = isMobile ? 10 : 7; // approx px/char for overflow detection

      // Scale — exact Trevor formulas (convFlowToY, convWeekToX, inverses)
      // We work in months throughout (Trevor works in weeks; math is equivalent)
      const nMonths = 36; // 3 years

      const convMonthToX = m => (m / nMonths) * (plotR - plotL) + plotL;
      const convXToMonth = x => (x - plotL) / (plotR - plotL) * nMonths;
      const dynMinFlow = Math.exp(logMinRef.current);
      const dynMaxFlow = Math.exp(logMaxRef.current);
      const convFlowToY = f => (Math.log(Math.max(f, 1)) - logMinRef.current) / (logMaxRef.current - logMinRef.current) * (plotT - plotB) + plotB;
      const convYToFlow = y => Math.exp((y - plotB) / (plotT - plotB) * (logMaxRef.current - logMinRef.current) + logMinRef.current);

      const g = growth;
      const rev0Log = Math.log(Math.max(rev0, 1));
      const revAtMonth = m => Math.exp(rev0Log + Math.log(1 + g) * m);
      const expAtMonth = m => exp0 * Math.pow(1 + expGrowth, m);

      // Breakeven — revenue must grow faster than expenses to ever converge
      const breakevenMonth = rev0 >= exp0 ? 0
        : (g > expGrowth)
          ? Math.log(exp0 / rev0) / Math.log((1 + g) / (1 + expGrowth))
          : null;

      // $100M/yr milestone (Trevor uses $1B/yr — user wants $100M)
      const ipoFlow = 100000000 / 12; // $8.33M/mo
      const ipoMonth = (g > 0 && rev0 < ipoFlow)
        ? Math.log(ipoFlow / rev0) / Math.log(1 + g)
        : rev0 >= ipoFlow ? 0 : null;

      // Revenue line endpoint: Trevor uses min(nWeeks, ipoWeek)
      // Line only goes as far as the $100M milestone (or end of chart)
      const p1Month = (ipoMonth !== null && ipoMonth > 0)
        ? Math.max(1, Math.min(nMonths, ipoMonth))
        : nMonths;

      const p0X = convMonthToX(0), p0Y = convFlowToY(rev0);
      const p1X = convMonthToX(p1Month), p1Y = convFlowToY(revAtMonth(p1Month));
      const expY = convFlowToY(exp0);

      // Protractor anchored at year 2 (month 24)
      const protMonth = Math.min(24, nMonths);
      const protEndX = convMonthToX(protMonth);
      const protEndY = convFlowToY(revAtMonth(protMonth));
      const protLen = Math.sqrt((protEndX - p0X) ** 2 + (protEndY - p0Y) ** 2);
      const protRad = Math.min(
        (plotR - plotL) * (protMonth / nMonths), // year-2 horizontal distance
        p0Y - plotT - 10                          // don't arc above chart top
      );

      // Growth handle: on revenue line at protRad distance from p0, clamped within chart
      const rawPmX = p0X + (protEndX - p0X) * protRad / protLen;
      const rawPmY = p0Y + (protEndY - p0Y) * protRad / protLen;
      const pmX = Math.min(plotR - dragRad - 2, rawPmX);
      const pmY = Math.max(plotT + dragRad + 4, Math.min(plotB - dragRad - 2, rawPmY));

      // Monthly growth rates for protractor (Trevor's exact list)
      const monthlyRates = [0, 0.025, 0.05, 0.075, 0.10, 0.15, 0.20, 0.25, 0.30, 0.40, 0.50];

      // Compute angle for each rate anchored at protMonth (year 2)
      let maxAngle = 0;
      const rateLines = monthlyRates.map(gr => {
        const p3Y = convFlowToY(Math.exp(rev0Log + Math.log(1 + gr) * protMonth));
        const angle = Math.atan2(p3Y - p0Y, protEndX - p0X);
        if (angle < maxAngle) maxAngle = angle;
        const label = gr === 0 ? '0%' : `${Math.round(gr * 100)}%`;
        return { gr, angle: angle * 180 / Math.PI, label };
      });
      maxAngle -= 0.03;

      // Arc endpoints (angle=0 is rightward)
      const arcStartX = p0X + protRad, arcStartY = p0Y;
      const arcEndX = p0X + Math.cos(maxAngle) * protRad;
      const arcEndY = p0Y + Math.sin(maxAngle) * protRad;

      // Capital needed — integral of max(0, exp-rev) from 0 to breakeven
      let capitalNeeded = 0;
      if (breakevenMonth !== null && breakevenMonth > 0) {
        const steps = 200;
        for (let i = 0; i < steps; i++) {
          const mo = (breakevenMonth / steps) * (i + 0.5);
          capitalNeeded += Math.max(0, exp0 - revAtMonth(mo)) * (breakevenMonth / steps);
        }
      }

      // Y-axis flow values — log-scale ticks
      const yFlows = genFlowTicks(dynMinFlow, dynMaxFlow);

      const fmtMoney = v => {
        if (v >= 1e9) return '$' + Math.round(v/1e9) + 'B';
        if (v >= 1e6) return '$' + Math.round(v/1e6) + 'M';
        if (v >= 1e4) return '$' + (v/1e3).toFixed(0) + 'k';
        return '$' + Math.round(v);
      };
      const fmtMonthly = v => fmtMoney(v) + '/mo';
      const fmtTime = mo => mo < 12 ? `${Math.ceil(mo)} months` : `year ${Math.round(mo / 12)}`;

      // Snap to 2 significant figures so dragging gives clean round numbers
      const snapMoney = v => {
        if (v <= 0) return v;
        const mag = Math.pow(10, Math.floor(Math.log10(v)) - 1);
        return Math.round(v / mag) * mag;
      };

      // Drag handlers — Trevor's exact logic: convXToWeek(dragX) + convYToFlow(dragY)
      function startDrag(which) {
        return e => {
          e.preventDefault();
          dragging.current = which;
          const svgEl = svgRef.current;
          const clamp = f => Math.max(200, Math.min(f, 1e9));
          const onMove = ev => {
            const cx = ev.touches ? ev.touches[0].clientX : ev.clientX;
            const cy = ev.touches ? ev.touches[0].clientY : ev.clientY;
            const rect = svgEl.getBoundingClientRect();
            const sx = (cx - rect.left) / rect.width * W;
            const sy = (cy - rect.top) / rect.height * H;
            if (dragging.current === 'rev') {
              onRev(snapMoney(clamp(convYToFlow(sy))));
            } else if (dragging.current === 'exp') {
              onExp(snapMoney(clamp(convYToFlow(sy))));
            } else if (dragging.current === 'growth') {
              const dragMonth = convXToMonth(sx);
              if (dragMonth > 0.5) {
                const dragRev = clamp(convYToFlow(sy));
                const rawG = Math.exp(Math.log(dragRev / rev0) / dragMonth) - 1;
                onGrowth(Math.max(0, Math.min(Math.round(rawG * 100) / 100, 0.70)));
              }
            }
          };
          const onUp = () => {
            dragging.current = null;
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
            window.removeEventListener('touchmove', onMove);
            window.removeEventListener('touchend', onUp);
          };
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
          window.addEventListener('touchmove', onMove, { passive: false });
          window.addEventListener('touchend', onUp);
        };
      }

      const font = 'Artex, Arial, sans-serif';

      // Breakeven geometry
      const bxWithin = breakevenMonth !== null && breakevenMonth > 0 && breakevenMonth <= nMonths;
      const bx = bxWithin ? convMonthToX(breakevenMonth) : null;

      // Capital label position — Trevor's exact formula
      const lbMonth = (breakevenMonth !== null && breakevenMonth > 0) ? Math.min(5, breakevenMonth / 4) : 5;
      const lbX = plotL + 15;
      const lbY = (convFlowToY(revAtMonth(lbMonth)) + 2 * convFlowToY(expAtMonth(lbMonth))) / 3;

      // Tight-lines detection — when rev and exp handles are too close to label inline
      const expY0 = convFlowToY(exp0);
      const tightLines = Math.abs(p0Y - expY0) < fsAnnot * 3.5;

      // $100M milestone geometry
      const ipoWithin = ipoMonth !== null && ipoMonth > 0 && ipoMonth <= nMonths;
      const ipoX = ipoWithin ? convMonthToX(ipoMonth) : null;

      // ── Per-render label placement engine ────────────────────────────────────────
      const placed = []; // accumulates placed bboxes; checked on every render
      // Seed with drag handle exclusion zones so labels don't land on handles
      const hp = hitRad + 4;
      placed.push({ x: p0X - hp, y: p0Y - hp, w: hp * 2, h: hp * 2 });
      placed.push({ x: p0X - hp, y: expY0 - hp, w: hp * 2, h: hp * 2 });
      placed.push({ x: pmX - hp, y: pmY - hp, w: hp * 2, h: hp * 2 });

      const lineAngleDeg = Math.atan2(p1Y - p0Y, p1X - p0X) * 180 / Math.PI;
      const pct = Math.round(g * 100);
      const revText = `${fmtMoney(rev0)} revenue per month`;
      const growText = isMobile ? `${pct}% / mo` : `growing ${pct}% monthly`;
      const expText = `${fmtMoney(exp0)} expenses per month${expGrowth > 0 ? ` +${Math.round(expGrowth * 100)}%/mo` : ''}`;
      const capText = `${fmtMoney(capitalNeeded)} capital needed`;

      // Rotated label pair: check overlap in rotated x-space before rendering
      const revTextEndX = p0X + dragRad + 8 + revText.length * fsAnnot * 0.58;
      const growTextStartX = p0X + protRad + dragRad + 8;
      const showRevLabel = !tightLines && revTextEndX < growTextStartX - 6;

      // Register tightLines legend box as obstacle so other labels dodge it
      if (tightLines) {
        const tlLineCount = (rev0 < exp0 && breakevenMonth !== null && breakevenMonth > 0) ? 4 : 3;
        const tlLineH = fsAnnot + 7;
        const tlLongest = Math.max(revText.length, expText.length, growText.length);
        placed.push({ x: plotL + 10, y: plotT + 10,
          w: tlLongest * fsAnnot * 0.54 + 28, h: tlLineCount * tlLineH + 14 });
      }

      // Place non-rotated labels with collision avoidance
      let expPos = null, capPos = null;
      if (!tightLines) {
        expPos = placeLabel(p0X + 15, expY0 - 7, expText, fsAnnot, 'start', placed, plotL, plotR, plotT, plotB);
        if (rev0 < exp0 && breakevenMonth !== null && breakevenMonth > 0) {
          capPos = placeLabel(lbX, lbY, capText, fsCapLabel, 'start', placed, plotL, plotR, plotT, plotB);
        }
      }

      let bkPos = null, bkText = '', bkAnchor = 'start';
      if (breakevenMonth !== null && breakevenMonth > 0) {
        bkText = `Profitable at ${fmtTime(breakevenMonth)}`;
        if (bx) {
          const flipL = bx + 5 + bkText.length * charW > plotR;
          bkAnchor = flipL ? 'end' : 'start';
          bkPos = placeLabel(flipL ? bx - 3 : bx + 3, convFlowToY(exp0) + 22,
            bkText, fsAnnot, bkAnchor, placed, plotL, plotR, plotT, plotB);
        } else {
          bkAnchor = 'end';
          bkPos = placeLabel(plotR - 25, Math.min(convFlowToY(exp0), plotB - 10),
            bkText, fsAnnot, 'end', placed, plotL, plotR, plotT, plotB);
        }
      }

      let ipoPos = null, ipoAnchor = 'end', ipoAnnotText = '';
      let ipoLineX = null, ipoLineY = null, ipoP1lx = null;
      if (ipoMonth !== null && ipoMonth > 0) {
        ipoAnnotText = `$100M run rate at ${fmtTime(ipoMonth)}`;
        const ipoAboveScale = ipoFlow > dynMaxFlow;
        ipoLineX = ipoX ? ipoX : plotR;
        ipoLineY = ipoAboveScale ? plotT + 4 : (ipoX ? convFlowToY(ipoFlow) : Math.min(convFlowToY(revAtMonth(nMonths)), plotB - 30));
        ipoP1lx = Math.min(plotR - 20, ipoLineX - 20);
        if (ipoAboveScale && ipoX) {
          ipoAnchor = 'start';
          ipoPos = placeLabel(ipoLineX + 8, plotT + 14, ipoAnnotText, fsAnnot, 'start', placed, plotL, plotR, plotT, plotB);
        } else {
          ipoAnchor = 'end';
          ipoPos = placeLabel(ipoP1lx - 5, ipoLineY, ipoAnnotText, fsAnnot, 'end', placed, plotL, plotR, plotT, plotB);
        }
      }

      return (
        <div ref={containerRef}>
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} className="w-full h-auto" style={{ touchAction: 'none' }}>
          <defs>
            {/* Capital fill gradient */}
            <linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="rgba(210,245,255,0.9)" />
              <stop offset="100%" stopColor="rgba(210,245,255,0.3)" />
            </linearGradient>
            <clipPath id="chartClip">
              <rect x={plotL} y={plotT} width={plotR - plotL} height={plotB - plotT} />
            </clipPath>
          </defs>

          {/* ── Capital area — traces actual revenue curve, not a triangle ── */}
          {rev0 < exp0 && (() => {
            const endMo = bxWithin ? breakevenMonth : nMonths;
            const steps = 80;
            // Forward along revenue curve
            let d = `M ${p0X.toFixed(1)} ${p0Y.toFixed(1)}`;
            for (let i = 1; i <= steps; i++) {
              const m = (endMo / steps) * i;
              d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(revAtMonth(m)).toFixed(1)}`;
            }
            // Backward along expense curve — closes the area between the two curves
            for (let i = steps; i >= 0; i--) {
              const m = (endMo / steps) * i;
              d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(expAtMonth(m)).toFixed(1)}`;
            }
            d += ' Z';
            return <path clipPath="url(#chartClip)" d={d} fill="url(#capGrad)" />;
          })()}

          {/* ── Capital needed label ── */}
          {capPos && (
            <LabelBg x={capPos.x} y={capPos.y} text={capText}
              fontSize={fsCapLabel} fontFamily={font} fontWeight="bold" />
          )}

          {/* ── Costs-exceed-revenue zone: profitable now but expenses growing faster ── */}
          {rev0 > exp0 && expGrowth > g && (() => {
            const cMonth = Math.log(rev0 / exp0) / Math.log((1 + expGrowth) / (1 + g));
            if (cMonth <= 0 || cMonth > nMonths) return null;
            const cX = convMonthToX(cMonth);
            const cY = convFlowToY(expAtMonth(cMonth));
            const steps = 60;

            // Fill between expense (above) and revenue (below) from crossing to end of chart
            let d = `M ${cX.toFixed(1)} ${cY.toFixed(1)}`;
            for (let i = 1; i <= steps; i++) {
              const m = cMonth + (nMonths - cMonth) * i / steps;
              d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(expAtMonth(m)).toFixed(1)}`;
            }
            for (let i = steps; i >= 0; i--) {
              const m = cMonth + (nMonths - cMonth) * i / steps;
              d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(revAtMonth(m)).toFixed(1)}`;
            }
            d += ' Z';

            // Crossing annotation — mirrors breakeven annotation style
            const crossLabel = `Costs exceed revenue at ${fmtTime(cMonth)}`;
            const flipLeft = cX + crossLabel.length * charW > plotR;
            const lineEndY = Math.min(cY + 20, plotB - 4);

            // Philosophical label centred in the blue zone
            const midMonth = cMonth + (nMonths - cMonth) * 0.4;
            const midX = convMonthToX(midMonth);
            const midY = (convFlowToY(revAtMonth(midMonth)) + convFlowToY(expAtMonth(midMonth))) / 2;

            return (
              <g>
                <path clipPath="url(#chartClip)" d={d} fill="url(#capGrad)" />
                <line x1={cX} y1={cY} x2={cX} y2={lineEndY} stroke="#888" strokeWidth="1" />
                <LabelBg x={flipLeft ? cX - 3 : cX + 3} y={lineEndY + fsAnnot * 0.75}
                  text={crossLabel} fontSize={fsAnnot} fontFamily={font}
                  anchor={flipLeft ? 'end' : 'start'} />
                <LabelBg x={midX} y={midY} text="costs outrun growth"
                  fontSize={fsCapLabel} fontFamily={font} fontWeight="bold" anchor="middle" />
              </g>
            );
          })()}

          {/* ── Revenue line ── clipped so it doesn't extend above chart top */}
          <path d={`M ${p0X} ${p0Y} L ${p1X} ${p1Y}`} stroke="#ebff52" strokeWidth="3" fill="none" clipPath="url(#chartClip)" />

          {/* ── Expense line ── curved if expGrowth > 0 */}
          {(() => {
            let d = `M ${p0X.toFixed(1)} ${expY.toFixed(1)}`;
            if (expGrowth > 0) {
              for (let i = 1; i <= 60; i++) {
                const m = nMonths * i / 60;
                d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(expAtMonth(m)).toFixed(1)}`;
              }
            } else {
              d += ` L ${plotR} ${expY}`;
            }
            return <path d={d} stroke="#ff5252" strokeWidth="3" fill="none" clipPath="url(#chartClip)" />;
          })()}

          {/* ── Revenue start label — shown only when it fits before growth label in rotated x-space ── */}
          {showRevLabel && (
            <LabelBg x={p0X + dragRad + 8} y={p0Y - 7} text={revText}
              fontSize={fsAnnot} fontFamily={font} fontWeight="bold"
              transform={`rotate(${lineAngleDeg.toFixed(1)}, ${p0X.toFixed(1)}, ${p0Y.toFixed(1)})`} />
          )}

          {/* ── Growth rate label — anchored after protractor arc, always shown ── */}
          <LabelBg x={p0X + protRad + dragRad + 8} y={p0Y - 7} text={growText}
            fontSize={fsAnnot} fontFamily={font} fontWeight="bold"
            transform={`rotate(${lineAngleDeg.toFixed(1)}, ${p0X.toFixed(1)}, ${p0Y.toFixed(1)})`} />

          {/* ── Expense label ── */}
          {expPos && (
            <LabelBg x={expPos.x} y={expPos.y} text={expText}
              fontSize={fsAnnot} fontFamily={font} fontWeight="bold" />
          )}

          {/* ── Tight-lines floating legend — replaces all inline labels when crowded ── */}
          {tightLines && (() => {
            const lines = [
              { text: `${fmtMoney(rev0)} revenue / mo`, dot: '#ebff52', stroke: '#b8cc1a' },
              { text: `${fmtMoney(exp0)} expenses / mo`, dot: '#ff5252', stroke: '#cc1a1a' },
              { text: growText, dot: '#555', stroke: '#333' },
              ...(rev0 < exp0 && breakevenMonth !== null && breakevenMonth > 0 && capitalNeeded > 0
                ? [{ text: `${fmtMoney(capitalNeeded)} capital needed`, dot: '#d2f5ff', stroke: '#aac8d8' }]
                : []),
            ];
            const lineH = fsAnnot + 7;
            const pad = 9;
            const maxW = Math.max(...lines.map(l => l.text.length)) * fsAnnot * 0.54 + pad * 2 + 14;
            const boxH = lines.length * lineH + pad * 1.5;
            const bx = plotL + 10;
            const by = plotT + 10;
            return (
              <g style={{ pointerEvents: 'none' }}>
                <rect x={bx} y={by} width={maxW} height={boxH}
                  fill="white" fillOpacity="0.93" rx="5" stroke="#e5e7eb" strokeWidth="1" />
                {lines.map((line, i) => (
                  <g key={i}>
                    <circle cx={bx + pad + 4} cy={by + pad + lineH * i + lineH / 2}
                      r={4} fill={line.dot} stroke={line.stroke} strokeWidth="1" />
                    <text x={bx + pad + 13} y={by + pad + lineH * i + lineH / 2}
                      fontSize={fsAnnot} fontFamily={font} fontWeight="bold" fill="#000" dominantBaseline="middle">
                      {line.text}
                    </text>
                  </g>
                ))}
              </g>
            );
          })()}

          {/* ── Protractor ── Trevor: tick marks at arc edge + labels, arc counterclockwise */}
          {rateLines.map(({ gr, angle, label }) => (
            <g key={gr} transform={`rotate(${angle.toFixed(2)}, ${p0X.toFixed(1)}, ${p0Y.toFixed(1)})`}>
              <line x1={p0X + protRad} y1={p0Y} x2={p0X + protRad + 10} y2={p0Y}
                stroke="#999" strokeWidth="1" />
              <text x={p0X + protRad + 13} y={p0Y + 4}
                fontSize={fsProt} fontFamily={font} fill="#666">{label}</text>
            </g>
          ))}
          {/* Arc: from angle=0 (rightward) to maxAngle, counterclockwise (sweep=0 in SVG) */}
          <path d={`M ${arcStartX.toFixed(1)} ${arcStartY.toFixed(1)} A ${protRad.toFixed(1)} ${protRad.toFixed(1)} 0 0 0 ${arcEndX.toFixed(1)} ${arcEndY.toFixed(1)}`}
            fill="none" stroke="#999" strokeWidth="1" />

          {/* ── Breakeven annotation ── */}
          {bkPos && (() => {
            if (bx) {
              return (
                <g>
                  <line x1={bx} y1={convFlowToY(exp0)} x2={bx} y2={bkPos.box.y} stroke="#888" strokeWidth="1" />
                  <LabelBg x={bkPos.x} y={bkPos.y} text={bkText}
                    fontSize={fsAnnot} fontFamily={font} anchor={bkAnchor} />
                </g>
              );
            } else {
              const py = Math.min(convFlowToY(exp0), plotB - 10);
              return (
                <g>
                  <path d={`M ${plotR} ${py} L ${plotR-20} ${py} M ${plotR} ${py} L ${plotR-8} ${py-3} M ${plotR} ${py} L ${plotR-8} ${py+3}`}
                    stroke="#888" strokeWidth="1" fill="none" />
                  <LabelBg x={bkPos.x} y={bkPos.y} text={bkText}
                    fontSize={fsAnnot} fontFamily={font} anchor="end" />
                </g>
              );
            }
          })()}

          {/* ── $100M run rate annotation ── */}
          {ipoPos && (() => {
            const ipoAboveScale = ipoFlow > dynMaxFlow;
            return (
              <g>
                {ipoAboveScale && ipoX ? (
                  <>
                    <line x1={ipoLineX} y1={plotT + 20} x2={ipoLineX} y2={plotT + 4} stroke="#888" strokeWidth="1" />
                    <line x1={ipoLineX} y1={plotT + 4} x2={ipoLineX - 4} y2={plotT + 10} stroke="#888" strokeWidth="1" />
                    <line x1={ipoLineX} y1={plotT + 4} x2={ipoLineX + 4} y2={plotT + 10} stroke="#888" strokeWidth="1" />
                    <LabelBg x={ipoPos.x} y={ipoPos.y} text={ipoAnnotText}
                      fontSize={fsAnnot} fontFamily={font} anchor={ipoAnchor} />
                  </>
                ) : (
                  <>
                    <line x1={ipoLineX} y1={ipoLineY} x2={ipoP1lx} y2={ipoLineY} stroke="#888" strokeWidth="1" />
                    {!ipoX && (
                      <>
                        <line x1={ipoLineX} y1={ipoLineY} x2={ipoLineX-8} y2={ipoLineY-3} stroke="#888" strokeWidth="1" />
                        <line x1={ipoLineX} y1={ipoLineY} x2={ipoLineX-8} y2={ipoLineY+3} stroke="#888" strokeWidth="1" />
                      </>
                    )}
                    <LabelBg x={ipoPos.x} y={ipoPos.y} text={ipoAnnotText}
                      fontSize={fsAnnot} fontFamily={font} anchor={ipoAnchor} />
                  </>
                )}
              </g>
            );
          })()}

          {/* ── Axes ── Trevor: drawAxes() */}
          <line x1={plotL} y1={plotB} x2={plotR} y2={plotB} stroke="#ccc" strokeWidth="1" />
          <line x1={plotL} y1={plotT} x2={plotL} y2={plotB} stroke="#ccc" strokeWidth="1" />

          {/* ── Y-axis auto-scale hint — arrow at axis top ── */}
          <g stroke="#ccc" strokeWidth="1.2" fill="none">
            <line x1={plotL} y1={plotT} x2={plotL} y2={plotT - 12} />
            <path d={`M ${plotL - 3.5} ${plotT - 8} L ${plotL} ${plotT - 13} L ${plotL + 3.5} ${plotT - 8}`} />
            <path d={`M ${plotL - 3.5} ${plotT + 5} L ${plotL} ${plotT + 10} L ${plotL + 3.5} ${plotT + 5}`} />
          </g>

          {/* ── Y-axis auto-scale hint — arrow at axis bottom, tip at plotB+5 (tick depth) ── */}
          {dynMinFlow > 200 && (
            <g stroke="#ccc" strokeWidth="1.2" fill="none">
              <line x1={plotL} y1={plotB} x2={plotL} y2={plotB + 3} />
              <path d={`M ${plotL - 3.5} ${plotB + 1} L ${plotL} ${plotB + 5} L ${plotL + 3.5} ${plotB + 1}`} />
            </g>
          )}

          {/* ── X labels ── Trevor: drawXLabels() — "year 0", "year 1", ... */}
          {[0,1,2,3].map(yr => {
            const x = convMonthToX(yr * 12);
            return (
              <g key={yr}>
                <line x1={x} y1={plotB} x2={x} y2={plotB + 5} stroke="#888" strokeWidth="1" />
                <text x={x} y={plotB + 17} textAnchor="middle" fontSize={fsXLabel} fontFamily={font} fill="#888" dominantBaseline="top">
                  {yr === 0 ? 'today' : yr === 3 ? '3 years' : `year ${yr}`}
                </text>
              </g>
            );
          })}

          {yFlows.map(flow => {
            const y = convFlowToY(flow);
            if (y < plotT + 5 || y > plotB - 14) return null;
            return (
              <g key={flow}>
                <line x1={plotL} y1={y} x2={plotL - 10} y2={y} stroke="#888" strokeWidth="1" />
                <text x={plotL - 12} y={y} textAnchor="end" fontSize={fsAxis} fontFamily={font} fill="#888" dominantBaseline="middle">
                  {fmtMoney(flow)}
                </text>
              </g>
            );
          })}

          {/* ── Drag handles ── invisible large hit area + visible circle */}
          {/* Revenue handle */}
          <circle cx={p0X} cy={p0Y} r={hitRad} fill="transparent"
            style={{ cursor: 'ns-resize' }}
            onMouseDown={startDrag('rev')} onTouchStart={startDrag('rev')} />
          <circle cx={p0X} cy={p0Y} r={dragRad} fill="#ebff52" stroke="#b8cc1a" strokeWidth={dragRad/4} style={{ pointerEvents: 'none' }} />
          <circle cx={p0X} cy={p0Y} r={dragRad * 0.25} fill="#f5ffaa" style={{ pointerEvents: 'none' }} />

          {/* Growth handle */}
          <circle cx={pmX} cy={pmY} r={hitRad} fill="transparent"
            style={{ cursor: 'ns-resize' }}
            onMouseDown={startDrag('growth')} onTouchStart={startDrag('growth')} />
          <circle cx={pmX} cy={pmY} r={dragRad + 2} fill="#ebff52" stroke="#b8cc1a" strokeWidth={2} style={{ pointerEvents: 'none' }} />

          {/* Expense handle */}
          <circle cx={p0X} cy={expY} r={hitRad} fill="transparent"
            style={{ cursor: 'ns-resize' }}
            onMouseDown={startDrag('exp')} onTouchStart={startDrag('exp')} />
          <circle cx={p0X} cy={expY} r={dragRad} fill="#ff5252" stroke="#cc1a1a" strokeWidth={dragRad/4} style={{ pointerEvents: 'none' }} />
          <circle cx={p0X} cy={expY} r={dragRad * 0.25} fill="#ff9090" style={{ pointerEvents: 'none' }} />

          {/* ── Summary sentence — right-aligned just above x-axis (desktop only) ── */}
          {summaryText && !isMobile && (
            <text x={plotR} y={plotB - 8} textAnchor="end" fontSize="11" fontFamily={font}
              fill="#9ca3af" letterSpacing="0.08em" dominantBaseline="bottom"
              style={{ pointerEvents: 'none' }}>
              {summaryText.toUpperCase()}
            </text>
          )}
        </svg>
          {/* Mobile callout */}
          {isMobile && summaryText && (
            <div style={{ marginTop: '8px', textAlign: 'center', fontFamily: 'Artex, sans-serif',
              fontSize: '11px', color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
              {summaryText}
            </div>
          )}
        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────────

    function App() {
      const defaults = useMemo(() => {
        const p = new URLSearchParams(window.location.search);
        return {
          rev: Number(p.get('r')) || 10000,
          exp: Number(p.get('e')) || 25000,
          g:   Number(p.get('g')) || 0.10,
          eg:  Number(p.get('eg')) || 0,
        };
      }, []);

      const [rev0,      setRev0]      = useState(defaults.rev);
      const [exp0,      setExp0]      = useState(defaults.exp);
      const [growth,    setGrowth]    = useState(defaults.g);
      const [expGrowth, setExpGrowth] = useState(defaults.eg);
      const [copied,    setCopied]    = useState(false);
      const [showExact, setShowExact] = useState(false);

      useEffect(() => {
        const p = new URLSearchParams({ r: Math.round(rev0), e: Math.round(exp0), g: growth.toFixed(4), eg: expGrowth.toFixed(4) });
        window.history.replaceState(null, '', '?' + p.toString());
      }, [rev0, exp0, growth, expGrowth]);

      const g = growth;
      const breakevenMonth = rev0 >= exp0 ? 0
        : (g > expGrowth)
          ? Math.log(exp0 / rev0) / Math.log((1 + g) / (1 + expGrowth))
          : null;

      let capitalNeeded = 0;
      if (breakevenMonth !== null && breakevenMonth > 0) {
        const steps = 200;
        for (let i = 0; i < steps; i++) {
          const mo = (breakevenMonth / steps) * (i + 0.5);
          capitalNeeded += Math.max(0, exp0 * Math.pow(1 + expGrowth, mo) - rev0 * Math.pow(1 + g, mo)) * (breakevenMonth / steps);
        }
      }

      const defaultAlive = breakevenMonth !== null;
      const fmt = n => n >= 1e6 ? `$${Math.round(n/1e6)}M` : n >= 1000 ? `$${Math.round(n/1000)}k` : `$${Math.round(n)}`;

      function copyLink() {
        navigator.clipboard.writeText(window.location.href);
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      }

      // Milestones data
      const MILESTONES = [
        { name: 'Wealthsimple', arr: 265_000_000, logo: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcDAp_72xcznmkFbk2lOe3KIvPlnRD_1SdiA&s' },
        { name: 'Shopify', arr: 8_900_000_000, logo: 'https://cdn.simpleicons.org/shopify' },
        { name: 'Stripe', arr: 15_000_000_000, logo: 'https://cdn.simpleicons.org/stripe' },
        { name: 'Apple', arr: 391_000_000_000, logo: 'https://cdn.simpleicons.org/apple' },
      ];

      const fmtRevenue = v => {
        if (v >= 1e9) return `$${(v/1e9).toFixed(0)}B run rate`;
        if (v >= 1e6) return `$${(v/1e6).toFixed(0)}M run rate`;
        return `$${(v/1e3).toFixed(0)}k run rate`;
      };

      const fmtTimeLong = mo => {
        if (mo < 1) return 'now';
        if (mo < 12) return `${Math.ceil(mo)} months`;
        const yrs = mo / 12;
        return `${Math.round(yrs)} years`;
      };

      const milestoneMonths = MILESTONES.map(m => {
        const targetMonthly = m.arr / 12;
        if (rev0 >= targetMonthly) return 0; // already passed
        if (growth <= 0) return null; // never
        return Math.log(targetMonthly / rev0) / Math.log(1 + growth);
      });

      return (
        <div style={{ backgroundColor: '#fff', fontFamily: 'Artex, system-ui, sans-serif' }}>
          <main className="max-w-5xl mx-auto pt-2 pb-3">

            <div className="hidden md:block px-4" style={{ marginBottom: '12px' }}>
              <h1 style={{ fontFamily: 'Feature Display, serif', fontSize: '28px', fontWeight: 'normal', margin: '0 0 4px 0', lineHeight: 1.1 }}>
                Startup Growth Calculator
              </h1>
              <p style={{ fontSize: '12px', color: '#9ca3af', margin: 0 }}>
                Inspired by <a href="https://growth.tlb.org/" style={{ color: 'inherit', textDecoration: 'underline' }}>Trevor Blackwell's calculator</a> and <a href="https://www.paulgraham.com/aord.html" style={{ color: 'inherit', textDecoration: 'underline' }}>Paul Graham's essay</a>. Built for Canadian founders by TechTO.
              </p>
            </div>

            <div className="fadein-1">
              <GrowthChart rev0={rev0} exp0={exp0} expGrowth={expGrowth} growth={growth}
                onRev={setRev0} onExp={setExp0} onGrowth={setGrowth}
                capitalNeeded={capitalNeeded}
                summaryText={
                  defaultAlive && breakevenMonth > 0
                    ? `Profitable in ${Math.ceil(breakevenMonth)} months at ${Math.round(growth * 100)}% growth · ${fmt(capitalNeeded)} needed`
                    : defaultAlive && breakevenMonth === 0
                    ? `Already profitable at ${Math.round(growth * 100)}% monthly growth`
                    : `Costs growing faster than revenue — no profitability`
                } />
            </div>

            {/* Exact number entry — aligned with y-axis on desktop */}
            <div className="exact-numbers-wrap" style={{ marginTop: '12px' }}>
              <a onClick={() => setShowExact(s => !s)}
                style={{ fontSize: '11px', color: '#9ca3af', cursor: 'pointer', textDecoration: 'underline' }}>
                {showExact ? 'hide exact numbers' : 'enter exact numbers'}
              </a>
              {showExact && (() => {
                const parseMoney = s => {
                  s = s.replace(/[$,\s]/g, '').toLowerCase();
                  if (s.endsWith('k')) return parseFloat(s) * 1000;
                  if (s.endsWith('m')) return parseFloat(s) * 1000000;
                  return parseFloat(s);
                };
                const fieldStyle = { width: '120px', fontSize: '16px', padding: '3px 6px', border: '1px solid #e5e7eb', borderRadius: '5px', textAlign: 'right', fontFamily: 'Artex, sans-serif', outline: 'none' };
                const labelStyle = { fontSize: '10px', color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: '2px' };
                return (
                  <div style={{ display: 'flex', gap: '16px', marginTop: '8px', alignItems: 'flex-end', flexWrap: 'wrap' }}>
                    <div>
                      <span style={labelStyle}>Revenue per month</span>
                      <input key={'r'+rev0} type="text" defaultValue={Math.round(rev0)}
                        onFocus={e => { e.target.select(); }}
                        onBlur={e => { const v = parseMoney(e.target.value); if (!isNaN(v) && v > 0) setRev0(v); else e.target.value = Math.round(rev0); }}
                        onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                        style={fieldStyle} />
                    </div>
                    <div>
                      <span style={labelStyle}>Expenses per month</span>
                      <input key={'e'+exp0} type="text" defaultValue={Math.round(exp0)}
                        onFocus={e => { e.target.select(); }}
                        onBlur={e => { const v = parseMoney(e.target.value); if (!isNaN(v) && v > 0) setExp0(v); else e.target.value = Math.round(exp0); }}
                        onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                        style={fieldStyle} />
                    </div>
                    <div>
                      <span style={labelStyle}>Expense growth per month</span>
                      <input key={'eg'+expGrowth} type="text" defaultValue={Math.round(expGrowth * 100) + '%'}
                        onFocus={e => { e.target.select(); }}
                        onBlur={e => { const v = parseFloat(e.target.value.replace(/%/g, '')); if (!isNaN(v) && v >= 0) setExpGrowth(Math.min(v / 100, 0.50)); else e.target.value = Math.round(expGrowth * 100) + '%'; }}
                        onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                        style={fieldStyle} />
                    </div>
                    <div>
                      <span style={labelStyle}>Revenue growth per month</span>
                      <input key={'g'+growth} type="text" defaultValue={Math.round(growth * 100) + '%'}
                        onFocus={e => { e.target.select(); }}
                        onBlur={e => { const v = parseFloat(e.target.value.replace(/%/g, '')); if (!isNaN(v) && v >= 0) setGrowth(Math.min(v / 100, 0.70)); else e.target.value = Math.round(growth * 100) + '%'; }}
                        onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                        style={fieldStyle} />
                    </div>
                  </div>
                );
              })()}
            </div>

            <div className="px-4">
            {/* Milestones Panel */}
            <div style={{ marginBottom: '20px', marginTop: '16px' }}>
              <p style={{ fontSize: '12px', color: '#9ca3af', marginBottom: '12px', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
                At your current growth rate, here's when you'll hit the milestones that matter.
              </p>

              {/* Generic milestones row */}
              {(() => {
                const genericMilestones = [
                  { label: 'Default Alive', desc: 'reach profitability', arr: null },
                  { label: '$1M run rate', desc: 'first million', arr: 1_000_000 },
                  { label: '$10M run rate', desc: 'real traction', arr: 10_000_000 },
                  { label: '$100M run rate', desc: 'category leader', arr: 100_000_000 },
                ];
                const moForGeneric = genericMilestones.map(m => {
                  if (m.arr === null) return breakevenMonth;
                  const target = m.arr / 12;
                  if (rev0 >= target) return 0;
                  if (growth <= 0) return null;
                  return Math.log(target / rev0) / Math.log(1 + growth);
                });
                return (
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                    {genericMilestones.map((m, i) => {
                      const mo = moForGeneric[i];
                      const passed = mo === 0;
                      const never = mo === null;
                      return (
                        <div key={i} style={{
                          border: `1.5px solid ${passed ? '#22c55e' : '#e5e7eb'}`,
                          borderRadius: '10px',
                          padding: '14px 16px',
                          background: passed ? '#f0fdf4' : '#fff',
                          display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
                          minHeight: '130px',
                        }}>
                          <div>
                            <div style={{ fontSize: '13px', fontWeight: 'bold', color: '#111', lineHeight: 1.2 }}>
                              {m.label}
                            </div>
                            <div style={{ fontSize: '12px', color: '#6b7280', marginTop: '2px' }}>{m.desc}</div>
                          </div>
                          <div style={{ fontSize: '18px', fontWeight: 'bold', fontFamily: 'Feature Display, serif', color: passed ? '#16a34a' : never ? '#9ca3af' : '#111', marginTop: '10px' }}>
                            {passed ? 'Already here' : never ? 'Never' : fmtTimeLong(mo)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* Company milestones */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                {MILESTONES.map((m, i) => {
                  const mo = milestoneMonths[i];
                  const passed = mo === 0;
                  const never = mo === null;
                  return (
                    <div key={i} style={{
                      border: `1.5px solid ${passed ? '#22c55e' : '#e5e7eb'}`,
                      borderRadius: '10px',
                      padding: '14px 16px',
                      background: passed ? '#f0fdf4' : '#fff',
                      position: 'relative',
                      overflow: 'hidden',
                      display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
                      minHeight: '130px',
                    }}>
                      {passed && (
                        <div style={{
                          position: 'absolute', top: '8px', right: '10px',
                          fontSize: '11px', fontWeight: 'bold', color: '#16a34a',
                        }}>✓ Passed</div>
                      )}
                      <img
                        src={m.logo}
                        alt={m.name}
                        style={{ width: '24px', height: '24px', objectFit: 'contain', filter: passed ? 'none' : 'grayscale(100%)', marginBottom: '8px', display: 'block' }}
                        onError={e => { e.target.style.display = 'none'; }}
                      />
                      <div style={{ fontSize: '13px', fontWeight: 'bold', color: '#111', lineHeight: 1.2 }}>
                        {m.name}
                      </div>
                      <div style={{ fontSize: '12px', color: '#6b7280', marginTop: '2px' }}>{fmtRevenue(m.arr)}</div>
                      <div style={{
                        marginTop: '10px',
                        fontSize: '18px',
                        fontWeight: 'bold',
                        fontFamily: 'Feature Display, serif',
                        color: passed ? '#16a34a' : never ? '#9ca3af' : '#111',
                      }}>
                        {passed ? 'Already here' : never ? 'Never' : fmtTimeLong(mo)}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ display: 'flex', alignItems: 'center', gap: '12px', marginTop: '20px', marginBottom: '20px' }}>
              <button onClick={copyLink} className="button w-button">
                {copied ? '✓ Copied!' : 'Copy Link'}
              </button>
              <a onClick={() => { setRev0(10000); setExp0(25000); setGrowth(0.10); setExpGrowth(0); }}
                style={{ fontSize: '12px', color: '#9ca3af', cursor: 'pointer', textDecoration: 'underline' }}>
                Reset
              </a>
            </div>
            </div>{/* end px-4 wrapper */}

          </main>

          {/* Fixed bottom dock — desktop only */}
          <div className="hidden md:block" style={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 10, background: '#fff' }}>
            <div className="fadein-6 padding-global">
              <div className="container-large">
                <div className="padding-bottom padding-medium">
                  <div className="cta8_component">
                    <div className="cta8_content">
                      <div className="text-size-large">Meet leaders, share ideas, and connect with people who can open new doors.</div>
                    </div>
                    <a href="https://techto.org/events" className="button is-secondary w-button">See Upcoming Events</a>
                  </div>
                </div>
              </div>
            </div>
            <div style={{
              height: '60px',
              backgroundImage: "url('https://cdn.prod.website-files.com/66f1864b4a6f3045a6a2ca3e/66f4193346a254b2220786a2_Grid.svg')",
              backgroundPosition: '50% 0', backgroundRepeat: 'no-repeat', backgroundSize: 'cover',
            }} />
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <script src="webflow-export/js/webflow.js"></script>
  <script>
    (function () {
      const chars = 'abcdefghijklmnopqrstuvwxyz';
      const initialized = new WeakSet();
      function addScramble(btn) {
        if (initialized.has(btn)) return;
        initialized.add(btn);
        let frame, running = false, original = '';
        btn.addEventListener('mouseenter', () => {
          original = btn.textContent.trim();
          if (running) cancelAnimationFrame(frame);
          running = true;
          const start = performance.now(), duration = 300;
          (function tick(now) {
            const t = Math.min((now - start) / duration, 1);
            const resolved = Math.floor(t * original.length);
            btn.textContent = original.split('').map((c, i) =>
              c === ' ' ? ' ' : i < resolved ? c : chars[Math.floor(Math.random() * chars.length)]
            ).join('');
            if (t < 1) { frame = requestAnimationFrame(tick); }
            else { btn.textContent = original; running = false; }
          })(performance.now());
        });
        btn.addEventListener('mouseleave', () => {
          if (running) { cancelAnimationFrame(frame); btn.textContent = original; running = false; }
        });
      }
      function init() { document.querySelectorAll('.button').forEach(addScramble); }
      init();
      new MutationObserver(init).observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
