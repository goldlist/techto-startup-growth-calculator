    .view-wrap.view-hidden { opacity: 0; transform: scale(0.98); pointer-events: none; }

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // Generate log-scale Y-axis ticks at 1× and 3× each decade
    function genFlowTicks(minF, maxF) {
      const ticks = [];
      for (let exp = 1; exp <= 9; exp++) {
        for (const base of [1, 3]) {
          const val = base * Math.pow(10, exp);
          if (val >= minF && val <= maxF) ticks.push(val);
        }
      }
      return ticks;
    }

    // Compute target log-scale range for auto-zoom (data occupies ~70% of chart)
    function computeTargetLogRange(rev0, exp0, expGrowth, growth) {
      const revEnd = rev0 * Math.pow(1 + growth, 36);
      const expEnd = exp0 * Math.pow(1 + expGrowth, 36);
      const rawMin = Math.min(rev0, exp0);
      const rawMax = Math.max(revEnd, expEnd);
      const safeMin = Math.max(rawMin, 100);
      const safeMax = Math.max(rawMax, safeMin * 2);
      const lMin = Math.log(safeMin);
      const lMax = Math.log(safeMax);
      const logRange = Math.max(lMax - lMin, 2);
      const pad = logRange * 0.15;
      return { lMin: lMin - pad, lMax: lMax + pad };
    }

    // ─── Mobile chart — same visual language as desktop, display-only ────────────
    function MobileSimpleChart({ rev0, exp0, expGrowth, growth, breakevenMonth, onRev, onExp, onGrowth }) {
      const svgRef  = useRef(null);
      const dragRef = useRef(null);
      const logMinRef = useRef(null);
      const logMaxRef = useRef(null);
      // Compute Y-axis range synchronously — no animation RAF, no forceRender
      const { lMin, lMax } = computeTargetLogRange(rev0, exp0, expGrowth, growth);
      logMinRef.current = lMin;
      logMaxRef.current = lMax;

      const W = 500, H = 300, plotL = 52, plotR = 488, plotT = 14, plotB = 268, nMonths = 36;
      const font = 'Artex, system-ui, sans-serif';
      const convMonthToX = m => plotL + (m / nMonths) * (plotR - plotL);
      const convFlowToY  = v => plotB - (Math.log(Math.max(v, 1)) - logMinRef.current) / (logMaxRef.current - logMinRef.current) * (plotB - plotT);
      const revAtMonth   = m => rev0 * Math.pow(1 + growth, m);
      const expAtMonth   = m => exp0 * Math.pow(1 + expGrowth, m);
      const fmtM = v => v >= 1e6 ? '$'+Math.round(v/1e6)+'M' : v >= 1e4 ? '$'+(v/1e3).toFixed(0)+'k' : v >= 1e3 ? '$'+(v/1e3).toFixed(1)+'k' : '$'+Math.round(v);

      // Drag helpers — keep stable refs so useEffect doesn't re-register
      const onRevRef = useRef(onRev); onRevRef.current = onRev;
      const onExpRef = useRef(onExp); onExpRef.current = onExp;
      const onGrowthRef = useRef(onGrowth); onGrowthRef.current = onGrowth;
      const rev0Ref = useRef(rev0); rev0Ref.current = rev0;

      const yToFlow = y => {
        const t = Math.max(0, Math.min(1, (plotB - y) / (plotB - plotT)));
        const v = Math.exp(logMinRef.current + t * (logMaxRef.current - logMinRef.current));
        return isFinite(v) ? v : 500;
      };
      const getSvgY = (clientY) => {
        const el = svgRef.current; if (!el) return plotB;
        const rect = el.getBoundingClientRect();
        return (clientY - rect.top) * (H / rect.height);
      };
      const onDragStart = (handle, e) => { e.preventDefault(); e.stopPropagation(); dragRef.current = handle; };
      const onDragEnd   = () => { dragRef.current = null; };

      // Attach touchmove with passive:false; throttle updates to one per rAF to prevent crash
      useEffect(() => {
        const el = svgRef.current; if (!el) return;
        let rafId = null, pendingHandle = null, pendingV = null;
        const flush = () => {
          rafId = null;
          if (!pendingHandle) return;
          const h = pendingHandle, v = pendingV;
          pendingHandle = null; pendingV = null;
          if (h === 'rev') onRevRef.current && onRevRef.current(v);
          else if (h === 'exp') onExpRef.current && onExpRef.current(v);
          else if (h === 'growth') {
            const g = Math.pow(v / Math.max(rev0Ref.current, 1), 1 / nMonths) - 1;
            if (isFinite(g)) onGrowthRef.current && onGrowthRef.current(Math.max(0.01, Math.min(0.70, g)));
          }
        };
        const onTouchMove = e => {
          if (!dragRef.current) return;
          e.preventDefault();
          const touch = e.touches[0]; if (!touch) return;
          const v = Math.max(500, Math.min(2000000, yToFlow(getSvgY(touch.clientY))));
          if (!isFinite(v)) return;
          pendingHandle = dragRef.current; pendingV = v;
          if (!rafId) rafId = requestAnimationFrame(flush);
        };
        const onTouchEnd = () => { dragRef.current = null; if (rafId) { cancelAnimationFrame(rafId); rafId = null; } };
        el.addEventListener('touchmove', onTouchMove, { passive: false });
        el.addEventListener('touchend', onTouchEnd);
        el.addEventListener('touchcancel', onTouchEnd);
        return () => {
          if (rafId) cancelAnimationFrame(rafId);
          el.removeEventListener('touchmove', onTouchMove);
          el.removeEventListener('touchend', onTouchEnd);
          el.removeEventListener('touchcancel', onTouchEnd);
        };
      }, []); // eslint-disable-line

      const onMouseMove = e => {
        if (!dragRef.current) return;
        const v = Math.max(500, Math.min(2000000, yToFlow(getSvgY(e.clientY))));
        if (!isFinite(v)) return;
        if (dragRef.current === 'rev' && onRev) onRev(v);
        else if (dragRef.current === 'exp' && onExp) onExp(v);
        else if (dragRef.current === 'growth' && onGrowth) {
          const g = Math.pow(v / Math.max(rev0, 1), 1 / nMonths) - 1;
          if (isFinite(g)) onGrowth(Math.max(0.01, Math.min(0.70, g)));
        }
      };

      // Y-axis ticks
      const flowMin = Math.exp(logMinRef.current), flowMax = Math.exp(logMaxRef.current);
      const yFlows = genFlowTicks(flowMin, flowMax);

      // Revenue: straight line on log scale
      const revD = `M ${convMonthToX(0).toFixed(1)} ${convFlowToY(rev0).toFixed(1)} L ${plotR} ${convFlowToY(revAtMonth(nMonths)).toFixed(1)}`;

      // Expense line
      let expD = `M ${convMonthToX(0).toFixed(1)} ${convFlowToY(exp0).toFixed(1)}`;
      if (expGrowth > 0) {
        for (let i = 1; i <= 60; i++) { const m = nMonths * i / 60; expD += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(expAtMonth(m)).toFixed(1)}`; }
      } else { expD += ` L ${plotR} ${convFlowToY(exp0).toFixed(1)}`; }

      // Capital zone
      const endMo = (breakevenMonth !== null && breakevenMonth > 0) ? Math.min(breakevenMonth, nMonths) : 0;
      let capD = '';
      if (endMo > 0) {
        const steps = 60;
        capD = `M ${convMonthToX(0).toFixed(1)} ${convFlowToY(rev0).toFixed(1)}`;
        for (let i = 1; i <= steps; i++) { const m = endMo * i / steps; capD += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(revAtMonth(m)).toFixed(1)}`; }
        for (let i = steps; i >= 0; i--) { const m = endMo * i / steps; capD += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(expAtMonth(m)).toFixed(1)}`; }
        capD += ' Z';
      }

      const bxWithin = breakevenMonth !== null && breakevenMonth > 0 && breakevenMonth <= nMonths;

      return (
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} style={{ width: '100%', height: window.innerWidth < 640 ? '100%' : 'auto', display: 'block', touchAction: 'none' }}
          onMouseMove={onMouseMove} onMouseUp={onDragEnd} onMouseLeave={onDragEnd}>
          <defs>
            <linearGradient id="mCapGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="rgba(210,245,255,0.9)" />
              <stop offset="100%" stopColor="rgba(210,245,255,0.3)" />
            </linearGradient>
            <clipPath id="mChartClip">
              <rect x={plotL} y={plotT} width={plotR - plotL} height={plotB - plotT} />
            </clipPath>
          </defs>

          {/* Grid lines */}
          {yFlows.map(flow => {
            const y = convFlowToY(flow);
            if (y < plotT + 4 || y > plotB - 4) return null;
            return <line key={flow} x1={plotL} y1={y} x2={plotR} y2={y} stroke="#e5e7eb" strokeWidth="1" />;
          })}

          {/* Capital zone */}
          {capD && <path d={capD} fill="url(#mCapGrad)" clipPath="url(#mChartClip)" />}

          {/* Expense line */}
          <path d={expD} stroke="#ff5252" strokeWidth="3" fill="none" strokeLinecap="round" clipPath="url(#mChartClip)" />

          {/* Revenue line */}
          <path d={revD} stroke="#ebff52" strokeWidth="3" fill="none" strokeLinecap="round" clipPath="url(#mChartClip)" />

          {/* Axes */}
          <line x1={plotL} y1={plotT} x2={plotL} y2={plotB} stroke="#ccc" strokeWidth="1" />
          <line x1={plotL} y1={plotB} x2={plotR} y2={plotB} stroke="#ccc" strokeWidth="1" />

          {/* Y-axis labels */}
          {yFlows.map(flow => {
            const y = convFlowToY(flow);
            if (y < plotT + 4 || y > plotB - 4) return null;
            return <text key={flow} x={plotL - 4} y={y} textAnchor="end" dominantBaseline="middle" fontSize="13" fontFamily={font} fill="#888">{fmtM(flow)}</text>;
          })}

          {/* X-axis labels */}
          {[0,1,2,3].map(yr => {
            const x = convMonthToX(yr * 12);
            const anchor = yr === 3 ? 'end' : yr === 0 ? 'start' : 'middle';
            return (
              <g key={yr}>
                <line x1={x} y1={plotB} x2={x} y2={plotB + 5} stroke="#888" strokeWidth="1" />
                <text x={x} y={plotB + 15} textAnchor={anchor} dominantBaseline="top" fontSize="13" fontFamily={font} fill="#888">
                  {yr === 0 ? 'today' : `year ${yr}`}
                </text>
              </g>
            );
          })}

          {/* Revenue start handle */}
          {(() => {
            const cx = plotL, cy = convFlowToY(rev0);
            return (
              <g onMouseDown={e => onDragStart('rev', e)} onTouchStart={e => onDragStart('rev', e)} style={{ cursor: 'ns-resize' }}>
                <circle cx={cx} cy={cy} r={22} fill="transparent" />
                <circle cx={cx} cy={cy} r={9} fill="#b8cc1a" stroke="white" strokeWidth="2.5" />
                <circle cx={cx} cy={cy} r={9} fill="none" stroke="#b8cc1a" strokeWidth="1.5" className="handle-ripple" style={{ '--r0': '9px', '--r1': '22px' }} />
              </g>
            );
          })()}

          {/* Expense start handle */}
          {(() => {
            const cx = plotL, cy = convFlowToY(exp0);
            return (
              <g onMouseDown={e => onDragStart('exp', e)} onTouchStart={e => onDragStart('exp', e)} style={{ cursor: 'ns-resize' }}>
                <circle cx={cx} cy={cy} r={22} fill="transparent" />
                <circle cx={cx} cy={cy} r={9} fill="#ff5252" stroke="white" strokeWidth="2.5" />
                <circle cx={cx} cy={cy} r={9} fill="none" stroke="#ff5252" strokeWidth="1.5" className="handle-ripple" style={{ '--r0': '9px', '--r1': '22px' }} />
              </g>
            );
          })()}

          {/* Growth handle (right end of revenue line) */}
          {(() => {
            const cx = plotR, cy = convFlowToY(revAtMonth(nMonths));
            return (
              <g onMouseDown={e => onDragStart('growth', e)} onTouchStart={e => onDragStart('growth', e)} style={{ cursor: 'ns-resize' }}>
                <circle cx={cx} cy={cy} r={22} fill="transparent" />
                <circle cx={cx} cy={cy} r={9} fill="#b8cc1a" stroke="white" strokeWidth="2.5" />
                <circle cx={cx} cy={cy} r={9} fill="none" stroke="#b8cc1a" strokeWidth="1.5" className="handle-ripple" style={{ '--r0': '9px', '--r1': '22px' }} />
              </g>
            );
          })()}

          {/* Breakeven marker — diamond, not draggable */}
          {bxWithin && (() => {
            const bx = convMonthToX(breakevenMonth), by = convFlowToY(revAtMonth(breakevenMonth));
            const s = 7;
            return (
              <g style={{ pointerEvents: 'none' }}>
                <polygon points={`${bx},${by-s} ${bx+s},${by} ${bx},${by+s} ${bx-s},${by}`}
                  fill="white" stroke="#111" strokeWidth="1.5" />
              </g>
            );
          })()}
        </svg>
      );
    }

    // ─── Faithful port of Trevor Blackwell's GrowthView.js ───────────────────────
    // Source: https://gitlab.com/tlb/startuptools
    // Trevor's chart uses HTML5 Canvas; this is an SVG port of his exact logic.

    function GrowthChart({ rev0, exp0, expGrowth, growth, onRev, onExp, onGrowth, summaryText, capitalNeeded }) {
      const svgRef = useRef(null);
      const containerRef = useRef(null);
      const dragging = useRef(null);
      const [containerW, setContainerW] = useState(() => typeof window !== 'undefined' ? window.innerWidth : 900);

      // Compute Y-axis range synchronously — no animation RAF, no forceRender
      const logMinRef = useRef(null);
      const logMaxRef = useRef(null);
      const { lMin, lMax } = computeTargetLogRange(rev0, exp0, expGrowth, growth);
      logMinRef.current = lMin;
      logMaxRef.current = lMax;

      useEffect(() => {
        const el = containerRef.current;
        if (!el) return;
        const ro = new ResizeObserver(entries => setContainerW(entries[0].contentRect.width));
        ro.observe(el);
        return () => ro.disconnect();
      }, []);

      // Layout — mobile-responsive
      const isMobile = containerW < 640;
      const W = isMobile ? 500 : 900;
      const H = isMobile ? 540 : 500;
      const labelW = isMobile ? 56 : 72;
      const plotL = 5 + labelW;
      const plotR = W - (isMobile ? 38 : 20);
      const plotT = isMobile ? 38 : 45;
      const plotB = H - (isMobile ? 38 : 35);
      const dragRad = isMobile ? 13 : 7;
      const hitRad = isMobile ? 26 : dragRad;
      // Font sizes — scaled so rendered CSS pixels stay consistent across viewBox sizes
      const fsAxis = isMobile ? 15 : 11;
      const fsXLabel = isMobile ? 16 : 12;
      const fsAnnot = isMobile ? 18 : 13;
      const fsCapLabel = isMobile ? 19 : 14;
      const fsProt = isMobile ? 15 : 11;
      const charW = isMobile ? 10 : 7; // approx px/char for overflow detection

      // Scale — exact Trevor formulas (convFlowToY, convWeekToX, inverses)
      // We work in months throughout (Trevor works in weeks; math is equivalent)
      const nMonths = 36; // 3 years

      const convMonthToX = m => (m / nMonths) * (plotR - plotL) + plotL;
      const convXToMonth = x => (x - plotL) / (plotR - plotL) * nMonths;
      const dynMinFlow = Math.exp(logMinRef.current);
      const dynMaxFlow = Math.exp(logMaxRef.current);
      const convFlowToY = f => (Math.log(Math.max(f, 1)) - logMinRef.current) / (logMaxRef.current - logMinRef.current) * (plotT - plotB) + plotB;
      const convYToFlow = y => Math.exp((y - plotB) / (plotT - plotB) * (logMaxRef.current - logMinRef.current) + logMinRef.current);

      const g = growth;
      const rev0Log = Math.log(Math.max(rev0, 1));
      const revAtMonth = m => Math.exp(rev0Log + Math.log(1 + g) * m);
      const expAtMonth = m => exp0 * Math.pow(1 + expGrowth, m);

      // Breakeven — revenue must grow faster than expenses to ever converge
      const breakevenMonth = rev0 >= exp0 ? 0
        : (g > expGrowth)
          ? Math.log(exp0 / rev0) / Math.log((1 + g) / (1 + expGrowth))
          : null;

      // $100M/yr milestone (Trevor uses $1B/yr — user wants $100M)
      const ipoFlow = 100000000 / 12; // $8.33M/mo
      const ipoMonth = (g > 0 && rev0 < ipoFlow)
        ? Math.log(ipoFlow / rev0) / Math.log(1 + g)
        : rev0 >= ipoFlow ? 0 : null;

      // Revenue line always extends to end of chart — $100M milestone is an
      // annotation on the line, not its endpoint (truncating caused visual gaps)
      const p1Month = nMonths;

      const p0X = convMonthToX(0), p0Y = convFlowToY(rev0);
      const p1X = convMonthToX(p1Month), p1Y = convFlowToY(revAtMonth(p1Month));
      const expY = convFlowToY(exp0);

      // Protractor anchored at year 2 (month 24)
      const protMonth = Math.min(24, nMonths);
      const protEndX = convMonthToX(protMonth);
      const protEndY = convFlowToY(revAtMonth(protMonth));
      const protLen = Math.sqrt((protEndX - p0X) ** 2 + (protEndY - p0Y) ** 2);
      const protRad = Math.min(
        (plotR - plotL) * (protMonth / nMonths), // year-2 horizontal distance
        p0Y - plotT - 10                          // don't arc above chart top
      );

      // Growth handle: on revenue line at protRad distance from p0, clamped within chart
      const rawPmX = p0X + (protEndX - p0X) * protRad / protLen;
      const rawPmY = p0Y + (protEndY - p0Y) * protRad / protLen;
      const pmX = Math.min(plotR - dragRad - 2, rawPmX);
      const pmY = Math.max(plotT + dragRad + 4, Math.min(plotB - dragRad - 2, rawPmY));

      // Monthly growth rates for protractor (Trevor's exact list)
      const monthlyRates = [0, 0.025, 0.05, 0.075, 0.10, 0.15, 0.20, 0.25, 0.30, 0.40, 0.50];

      // Compute angle for each rate anchored at protMonth (year 2)
      let maxAngle = 0;
      const rateLines = monthlyRates.map(gr => {
        const p3Y = convFlowToY(Math.exp(rev0Log + Math.log(1 + gr) * protMonth));
        const angle = Math.atan2(p3Y - p0Y, protEndX - p0X);
        if (angle < maxAngle) maxAngle = angle;
        const label = gr === 0 ? '0%' : `${Math.round(gr * 100)}%`;
        return { gr, angle: angle * 180 / Math.PI, label };
      });
      maxAngle -= 0.03;

      // Arc endpoints (angle=0 is rightward)
      const arcStartX = p0X + protRad, arcStartY = p0Y;
      const arcEndX = p0X + Math.cos(maxAngle) * protRad;
      const arcEndY = p0Y + Math.sin(maxAngle) * protRad;

      // Y-axis flow values — log-scale ticks
      const yFlows = genFlowTicks(dynMinFlow, dynMaxFlow);

      const fmtMoney = v => {
        if (v >= 1e9) return '$' + Math.round(v/1e9) + 'B';
        if (v >= 1e6) return '$' + Math.round(v/1e6) + 'M';
        if (v >= 1e4) return '$' + (v/1e3).toFixed(0) + 'k';
        if (v >= 1e3) return '$' + (v/1e3).toFixed(1) + 'k';
        return '$' + Math.round(v);
      };
      const fmtMonthly = v => fmtMoney(v) + '/mo';
      const fmtTime = mo => mo < 12 ? `${Math.ceil(mo)} months` : `year ${Math.round(mo / 12)}`;

      // Snap to 2 significant figures so dragging gives clean round numbers
      const snapMoney = v => {
        if (v <= 0) return v;
        const mag = Math.pow(10, Math.floor(Math.log10(v)) - 1);
        return Math.round(v / mag) * mag;
      };

      // Snap growth rate to nearest arc label if within ~1% of it
      const snapToRate = rawG => {
        const nearest = monthlyRates.reduce((a, b) => Math.abs(b - rawG) < Math.abs(a - rawG) ? b : a);
        return Math.abs(nearest - rawG) < 0.012 ? nearest : rawG;
      };

      // Drag handlers — Trevor's exact logic, throttled to one state update per rAF
      function startDrag(which) {
        return e => {
          e.preventDefault();
          dragging.current = which;
          const svgEl = svgRef.current;
          const clamp = f => Math.max(200, Math.min(f, 1e9));
          let rafId = null, pendingCx = 0, pendingCy = 0;
          const flush = () => {
            rafId = null;
            const rect = svgEl.getBoundingClientRect();
            const sx = (pendingCx - rect.left) / rect.width * W;
            const sy = (pendingCy - rect.top) / rect.height * H;
            if (dragging.current === 'rev') {
              onRev(snapMoney(clamp(convYToFlow(sy))));
            } else if (dragging.current === 'exp') {
              onExp(snapMoney(clamp(convYToFlow(sy))));
            } else if (dragging.current === 'growth') {
              const dragMonth = convXToMonth(sx);
              if (dragMonth > 0.5) {
                const dragRev = clamp(convYToFlow(sy));
                const rawG = Math.exp(Math.log(dragRev / rev0) / dragMonth) - 1;
                onGrowth(Math.max(0, Math.min(snapToRate(rawG), 0.70)));
              }
            }
          };
          const onMove = ev => {
            if (ev.touches && ev.touches.length === 0) return;
            pendingCx = ev.touches ? ev.touches[0].clientX : ev.clientX;
            pendingCy = ev.touches ? ev.touches[0].clientY : ev.clientY;
            if (!rafId) rafId = requestAnimationFrame(flush);
          };
          const onUp = () => {
            dragging.current = null;
            if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
            window.removeEventListener('mousemove', onMove);
            window.removeEventListener('mouseup', onUp);
            window.removeEventListener('touchmove', onMove);
            window.removeEventListener('touchend', onUp);
            window.removeEventListener('touchcancel', onUp);
          };
          window.addEventListener('mousemove', onMove);
          window.addEventListener('mouseup', onUp);
          window.addEventListener('touchmove', onMove, { passive: false });
          window.addEventListener('touchend', onUp);
          window.addEventListener('touchcancel', onUp);
        };
      }

      const font = 'Artex, Arial, sans-serif';

      // Breakeven geometry
      const bxWithin = breakevenMonth !== null && breakevenMonth > 0 && breakevenMonth <= nMonths;
      const bx = bxWithin ? convMonthToX(breakevenMonth) : null;

      // Capital label position — Trevor's exact formula
      const lbMonth = (breakevenMonth !== null && breakevenMonth > 0) ? Math.min(5, breakevenMonth / 4) : 5;
      const lbX = plotL + 15;
      const lbY = (convFlowToY(revAtMonth(lbMonth)) + 2 * convFlowToY(expAtMonth(lbMonth))) / 3;

      // Tight-lines detection — when rev and exp handles are too close to label inline
      const expY0 = convFlowToY(exp0);
      // When rev > exp there's no capital area crowding labels, so use much tighter thresholds
      const belowBreakeven = rev0 < exp0;
      // earlyTight: slanted revenue label goes to legend first
      const earlyTight = Math.abs(p0Y - expY0) < fsAnnot * (belowBreakeven ? 9 : 3);
      // tightLines: horizontal expense label goes to legend too
      const tightLines = Math.abs(p0Y - expY0) < fsAnnot * (belowBreakeven ? 5 : 1.5);
      // Tight-cap detection — when the capital zone is too narrow to fit the inline label
      const capGapAtLabel = (rev0 < exp0 && breakevenMonth !== null && breakevenMonth > 0 && capitalNeeded > 0)
        ? convFlowToY(revAtMonth(lbMonth)) - convFlowToY(expAtMonth(lbMonth))
        : Infinity;
      const tightCap = capGapAtLabel < fsCapLabel * 3;

      // $100M milestone geometry
      const ipoWithin = ipoMonth !== null && ipoMonth > 0 && ipoMonth <= nMonths;
      const ipoX = ipoWithin ? convMonthToX(ipoMonth) : null;

      return (
        <div ref={containerRef}>
        <svg ref={svgRef} viewBox={`0 0 ${W} ${H}`} className="w-full h-auto" style={{ touchAction: 'none' }}>
          <defs>
            <filter id="legendShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="2" stdDeviation="6" floodColor="#00000030" />
            </filter>
            {/* Capital fill gradient */}
            <linearGradient id="capGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="rgba(210,245,255,0.9)" />
              <stop offset="100%" stopColor="rgba(210,245,255,0.3)" />
            </linearGradient>
            <clipPath id="chartClip">
              <rect x={plotL} y={plotT} width={plotR - plotL} height={plotB - plotT} />
            </clipPath>
          </defs>

          {/* ── Capital area — traces actual revenue curve, not a triangle ── */}
          {rev0 < exp0 && (() => {
            const endMo = bxWithin ? breakevenMonth : nMonths;
            const steps = 80;
            // Forward along revenue curve
            let d = `M ${p0X.toFixed(1)} ${p0Y.toFixed(1)}`;
            for (let i = 1; i <= steps; i++) {
              const m = (endMo / steps) * i;
              d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(revAtMonth(m)).toFixed(1)}`;
            }
            // Backward along expense curve — closes the area between the two curves
            for (let i = steps; i >= 0; i--) {
              const m = (endMo / steps) * i;
              d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(expAtMonth(m)).toFixed(1)}`;
            }
            d += ' Z';
            return <path clipPath="url(#chartClip)" d={d} fill="url(#capGrad)" />;
          })()}

          {/* ── Capital needed label (wide-gap, desktop only) ── */}
          {!earlyTight && !isMobile && !tightCap && rev0 < exp0 && breakevenMonth !== null && breakevenMonth > 0 && (() => {
            const label = `${fmtMoney(capitalNeeded)} capital needed`;
            return (
              <g style={{ pointerEvents: 'none' }}>
                <text x={lbX} y={lbY} fontSize={fsCapLabel} fontFamily={font} fontWeight="bold"
                  fill="#000" dominantBaseline="middle">
                  {label}
                </text>
              </g>
            );
          })()}

          {/* ── Costs-exceed-revenue zone: profitable now but expenses growing faster ── */}
          {rev0 > exp0 && expGrowth > g && (() => {
            const cMonth = Math.log(rev0 / exp0) / Math.log((1 + expGrowth) / (1 + g));
            if (cMonth <= 0 || cMonth > nMonths) return null;
            const cX = convMonthToX(cMonth);
            const cY = convFlowToY(expAtMonth(cMonth));
            const steps = 60;

            // Fill between expense (above) and revenue (below) from crossing to end of chart
            let d = `M ${cX.toFixed(1)} ${cY.toFixed(1)}`;
            for (let i = 1; i <= steps; i++) {
              const m = cMonth + (nMonths - cMonth) * i / steps;
              d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(expAtMonth(m)).toFixed(1)}`;
            }
            for (let i = steps; i >= 0; i--) {
              const m = cMonth + (nMonths - cMonth) * i / steps;
              d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(revAtMonth(m)).toFixed(1)}`;
            }
            d += ' Z';

            // Crossing annotation — mirrors breakeven annotation style
            const crossLabel = `Costs exceed revenue at ${fmtTime(cMonth)}`;
            const flipLeft = cX + crossLabel.length * charW > plotR;
            const lineEndY = Math.min(cY + 20, plotB - 4);

            // Philosophical label centred in the blue zone
            const midMonth = cMonth + (nMonths - cMonth) * 0.4;
            const midX = convMonthToX(midMonth);
            const midY = (convFlowToY(revAtMonth(midMonth)) + convFlowToY(expAtMonth(midMonth))) / 2;

            return (
              <g>
                <path clipPath="url(#chartClip)" d={d} fill="url(#capGrad)" />
                <line x1={cX} y1={cY} x2={cX} y2={lineEndY} stroke="#888" strokeWidth="1" />
                <text x={flipLeft ? cX - 3 : cX + 3} y={lineEndY + 2}
                  textAnchor={flipLeft ? 'end' : 'start'} fontSize={fsAnnot} fontFamily={font} fill="#000" dominantBaseline="top">
                  {crossLabel}
                </text>
                <text x={midX} y={midY}
                  textAnchor="middle" fontSize={fsCapLabel} fontFamily={font} fontWeight="bold" fill="#000" dominantBaseline="middle">
                  costs outrun growth
                </text>
              </g>
            );
          })()}

          {/* ── Revenue line ── clipped so it doesn't extend above chart top */}
          <path d={`M ${p0X} ${p0Y} L ${p1X} ${p1Y}`} stroke="#ebff52" strokeWidth="3" fill="none" clipPath="url(#chartClip)" />

          {/* ── Expense line ── curved if expGrowth > 0 */}
          {(() => {
            let d = `M ${p0X.toFixed(1)} ${expY.toFixed(1)}`;
            if (expGrowth > 0) {
              for (let i = 1; i <= 60; i++) {
                const m = nMonths * i / 60;
                d += ` L ${convMonthToX(m).toFixed(1)} ${convFlowToY(expAtMonth(m)).toFixed(1)}`;
              }
            } else {
              d += ` L ${plotR} ${expY}`;
            }
            return <path d={d} stroke="#ff5252" strokeWidth="3" fill="none" clipPath="url(#chartClip)" />;
          })()}

          {/* ── Revenue start label — desktop only; goes to legend when earlyTight ── */}
          {!earlyTight && !isMobile && (() => {
            const angle = Math.atan2(p1Y - p0Y, p1X - p0X) * 180 / Math.PI;
            return (
              <text transform={`rotate(${angle.toFixed(1)}, ${p0X.toFixed(1)}, ${p0Y.toFixed(1)})`}
                x={p0X + 15} y={p0Y - 7}
                textAnchor="start" fontSize={fsAnnot} fontFamily={font} fontWeight="bold" fill="#000">
                {fmtMoney(rev0)} revenue per month
              </text>
            );
          })()}

          {/* ── Growth rate label — desktop only ── */}
          {!isMobile && (() => {
            const pct = Math.round(g * 100);
            // Anchor off protRad (the actual arc end), not protMonth (which ignores vertical ceiling)
            const angle = Math.atan2(p1Y - p0Y, p1X - p0X) * 180 / Math.PI;
            return (
              <text transform={`rotate(${angle.toFixed(1)}, ${p0X.toFixed(1)}, ${p0Y.toFixed(1)})`}
                x={p0X + protRad + 60} y={p0Y - 7}
                textAnchor="start" fontSize={fsAnnot} fontFamily={font} fontWeight="bold" fill="#000">
                growing {pct}% monthly
              </text>
            );
          })()}

          {/* ── Expense label — desktop only; goes to legend when tightLines ── */}
          {!tightLines && !isMobile && (
            <text x={p0X + 15} y={expY - 7}
              fontSize={fsAnnot} fontFamily={font} fontWeight="bold" fill="#000">
              {fmtMoney(exp0)} expenses per month{expGrowth > 0 ? ` +${Math.round(expGrowth * 100)}%/mo` : ''}
            </text>
          )}


          {/* ── Protractor ── Trevor: tick marks at arc edge + labels, arc counterclockwise */}
          {rateLines.map(({ gr, angle, label }) => (
            <g key={gr} transform={`rotate(${angle.toFixed(2)}, ${p0X.toFixed(1)}, ${p0Y.toFixed(1)})`}>
              <line x1={p0X + protRad} y1={p0Y} x2={p0X + protRad + 10} y2={p0Y}
                stroke="#999" strokeWidth="1" />
              <text x={p0X + protRad + 13} y={p0Y + 4}
                fontSize={fsProt} fontFamily={font} fill="#666">{label}</text>
            </g>
          ))}
          {/* Arc: from angle=0 (rightward) to maxAngle, counterclockwise (sweep=0 in SVG) */}
          <path d={`M ${arcStartX.toFixed(1)} ${arcStartY.toFixed(1)} A ${protRad.toFixed(1)} ${protRad.toFixed(1)} 0 0 0 ${arcEndX.toFixed(1)} ${arcEndY.toFixed(1)}`}
            fill="none" stroke="#999" strokeWidth="1" />

          {/* ── Breakeven annotation ── Trevor: vertical line if within chart, arrow if beyond */}
          {breakevenMonth !== null && breakevenMonth > 0 && (() => {
            const label = `Profitable at ${fmtTime(breakevenMonth)}`;
            if (bx) {
              const ly = convFlowToY(exp0) + 20;
              const flipLeft = bx + 5 + label.length * charW > plotR;
              return (
                <g>
                  <line x1={bx} y1={convFlowToY(exp0)} x2={bx} y2={ly} stroke="#888" strokeWidth="1" />
                  <text x={flipLeft ? bx - 3 : bx + 3} y={ly + 2}
                    textAnchor={flipLeft ? 'end' : 'start'} fontSize={fsAnnot} fontFamily={font} fill="#000" dominantBaseline="top"
                    stroke="white" strokeWidth="4" paintOrder="stroke">
                    {label}
                  </text>
                </g>
              );
            } else {
              const py = Math.min(convFlowToY(exp0), plotB - 10);
              return (
                <g>
                  <path d={`M ${plotR} ${py} L ${plotR-20} ${py} M ${plotR} ${py} L ${plotR-8} ${py-3} M ${plotR} ${py} L ${plotR-8} ${py+3}`}
                    stroke="#888" strokeWidth="1" fill="none" />
                  <text x={plotR-25} y={py} textAnchor="end" fontSize={fsAnnot} fontFamily={font} fill="#000" dominantBaseline="middle"
                    stroke="white" strokeWidth="4" paintOrder="stroke">
                    {label}
                  </text>
                </g>
              );
            }
          })()}

          {/* ── $100M/yr annotation ── handles both within-scale and above-scale cases */}
          {ipoMonth !== null && ipoMonth > 0 && (() => {
            const label = `$100M run rate at ${fmtTime(ipoMonth)}`;
            const aboveScale = ipoFlow > dynMaxFlow;
            // When milestone is within time range but above chart scale, anchor at chart top
            const lineX = ipoX ? ipoX : plotR;
            const lineY = aboveScale ? plotT + 4 : (ipoX ? convFlowToY(ipoFlow) : Math.min(convFlowToY(revAtMonth(nMonths)), plotB - 30));
            const p1lx = Math.min(plotR - 20, lineX - 20);
            return (
              <g>
                {aboveScale && ipoX ? (
                  // Upward arrow at the milestone x-position on the chart top edge
                  <>
                    <line x1={lineX} y1={plotT + 20} x2={lineX} y2={plotT + 4} stroke="#888" strokeWidth="1" />
                    <line x1={lineX} y1={plotT + 4} x2={lineX - 4} y2={plotT + 10} stroke="#888" strokeWidth="1" />
                    <line x1={lineX} y1={plotT + 4} x2={lineX + 4} y2={plotT + 10} stroke="#888" strokeWidth="1" />
                    <text x={lineX + 8} y={plotT + 14} textAnchor="start" fontSize={fsAnnot} fontFamily={font} fill="#000" dominantBaseline="middle"
                      stroke="white" strokeWidth="4" paintOrder="stroke">
                      {label}
                    </text>
                  </>
                ) : (
                  <>
                    <line x1={lineX} y1={lineY} x2={p1lx} y2={lineY} stroke="#888" strokeWidth="1" />
                    {!ipoX && (
                      <>
                        <line x1={lineX} y1={lineY} x2={lineX-8} y2={lineY-3} stroke="#888" strokeWidth="1" />
                        <line x1={lineX} y1={lineY} x2={lineX-8} y2={lineY+3} stroke="#888" strokeWidth="1" />
                      </>
                    )}
                    <text x={p1lx - 5} y={lineY} textAnchor="end" fontSize={fsAnnot} fontFamily={font} fill="#000" dominantBaseline="middle"
                      stroke="white" strokeWidth="4" paintOrder="stroke">
                      {label}
                    </text>
                  </>
                )}
              </g>
            );
          })()}

          {/* ── Axes ── Trevor: drawAxes() */}
          <line x1={plotL} y1={plotB} x2={plotR} y2={plotB} stroke="#ccc" strokeWidth="1" />
          <line x1={plotL} y1={plotT} x2={plotL} y2={plotB} stroke="#ccc" strokeWidth="1" />

          {/* ── Y-axis auto-scale hint — arrow at axis top ── */}
          <g stroke="#ccc" strokeWidth="1.2" fill="none">
            <line x1={plotL} y1={plotT} x2={plotL} y2={plotT - 12} />
            <path d={`M ${plotL - 3.5} ${plotT - 8} L ${plotL} ${plotT - 13} L ${plotL + 3.5} ${plotT - 8}`} />
            <path d={`M ${plotL - 3.5} ${plotT + 5} L ${plotL} ${plotT + 10} L ${plotL + 3.5} ${plotT + 5}`} />
          </g>

          {/* ── Y-axis auto-scale hint — arrow at axis bottom, tip at plotB+5 (tick depth) ── */}
          {dynMinFlow > 200 && (
            <g stroke="#ccc" strokeWidth="1.2" fill="none">
              <line x1={plotL} y1={plotB} x2={plotL} y2={plotB + 3} />
              <path d={`M ${plotL - 3.5} ${plotB + 1} L ${plotL} ${plotB + 5} L ${plotL + 3.5} ${plotB + 1}`} />
            </g>
          )}

          {/* ── X labels ── Trevor: drawXLabels() — "year 0", "year 1", ... */}
          {[0,1,2,3].map(yr => {
            const x = convMonthToX(yr * 12);
            return (
              <g key={yr}>
                <line x1={x} y1={plotB} x2={x} y2={plotB + 5} stroke="#888" strokeWidth="1" />
                <text x={x} y={plotB + 17} textAnchor="middle" fontSize={fsXLabel} fontFamily={font} fill="#888" dominantBaseline="top">
                  {yr === 0 ? 'today' : `year ${yr}`}
                </text>
              </g>
            );
          })}

          {yFlows.map(flow => {
            const y = convFlowToY(flow);
            if (y < plotT + 5 || y > plotB - 14) return null;
            return (
              <g key={flow}>
                <line x1={plotL} y1={y} x2={plotL - 10} y2={y} stroke="#888" strokeWidth="1" />
                <text x={plotL - 12} y={y} textAnchor="end" fontSize={fsAxis} fontFamily={font} fill="#888" dominantBaseline="middle">
                  {fmtMoney(flow)}
                </text>
              </g>
            );
          })}

          {/* ── Drag handles ── invisible large hit area + visible circle */}
          {/* Revenue handle */}
          <circle cx={p0X} cy={p0Y} r={hitRad} fill="transparent"
            style={{ cursor: 'ns-resize' }}
            onMouseDown={startDrag('rev')} onTouchStart={startDrag('rev')} />
          <circle cx={p0X} cy={p0Y} r={dragRad} fill="none" stroke="#b8cc1a" strokeWidth={2} style={{ pointerEvents: 'none' }}>
            <animate attributeName="r" from={dragRad} to={dragRad * 3} dur="2.2s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="1" to="0" dur="2.2s" repeatCount="indefinite" />
          </circle>
          <circle cx={p0X} cy={p0Y} r={dragRad} fill="#ebff52" stroke="#b8cc1a" strokeWidth={dragRad/4} style={{ pointerEvents: 'none' }} />
          <circle cx={p0X} cy={p0Y} r={dragRad * 0.25} fill="#f5ffaa" style={{ pointerEvents: 'none' }} />

          {/* Growth handle */}
          <circle cx={pmX} cy={pmY} r={hitRad} fill="transparent"
            style={{ cursor: 'ns-resize' }}
            onMouseDown={startDrag('growth')} onTouchStart={startDrag('growth')} />
          <circle cx={pmX} cy={pmY} r={dragRad + 2} fill="none" stroke="#b8cc1a" strokeWidth={2} style={{ pointerEvents: 'none' }}>
            <animate attributeName="r" from={dragRad + 2} to={(dragRad + 2) * 3} dur="2.2s" begin="0.7s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="1" to="0" dur="2.2s" begin="0.7s" repeatCount="indefinite" />
          </circle>
          <circle cx={pmX} cy={pmY} r={dragRad + 2} fill="#ebff52" stroke="#b8cc1a" strokeWidth={2} style={{ pointerEvents: 'none' }} />

          {/* Expense handle */}
          <circle cx={p0X} cy={expY} r={hitRad} fill="transparent"
            style={{ cursor: 'ns-resize' }}
            onMouseDown={startDrag('exp')} onTouchStart={startDrag('exp')} />
          <circle cx={p0X} cy={expY} r={dragRad} fill="none" stroke="#cc1a1a" strokeWidth={2} style={{ pointerEvents: 'none' }}>
            <animate attributeName="r" from={dragRad} to={dragRad * 3} dur="2.2s" begin="1.4s" repeatCount="indefinite" />
            <animate attributeName="opacity" from="1" to="0" dur="2.2s" begin="1.4s" repeatCount="indefinite" />
          </circle>
          <circle cx={p0X} cy={expY} r={dragRad} fill="#ff5252" stroke="#cc1a1a" strokeWidth={dragRad/4} style={{ pointerEvents: 'none' }} />
          <circle cx={p0X} cy={expY} r={dragRad * 0.25} fill="#ff9090" style={{ pointerEvents: 'none' }} />

          {/* ── Summary sentence — right-aligned just above x-axis (desktop only) ── */}
          {summaryText && !isMobile && (
            <text x={plotR} y={plotB - 8} textAnchor="end" fontSize="11" fontFamily={font}
              fill="#9ca3af" letterSpacing="0.08em" dominantBaseline="bottom"
              style={{ pointerEvents: 'none' }}>
              {summaryText.toUpperCase()}
            </text>
          )}

          {/* ── Legend: rendered last so it paints over everything ── */}
          {(earlyTight || isMobile || tightCap) && (() => {
            const pct = Math.round(g * 100);
            const lines = [
              ...(earlyTight || isMobile ? [
                { text: `${fmtMoney(rev0)} revenue / mo`, dot: '#ebff52', stroke: '#b8cc1a' },
              ] : []),
              ...(tightLines || isMobile ? [
                { text: `${fmtMoney(exp0)} expenses / mo`, dot: '#ff5252', stroke: '#cc1a1a' },
              ] : []),
              ...(isMobile ? [{ text: `${pct}% / mo growth`, dot: '#555', stroke: '#333' }] : []),
              ...(rev0 < exp0 && breakevenMonth !== null && breakevenMonth > 0 && capitalNeeded > 0
                ? [{ text: `${fmtMoney(capitalNeeded)} capital needed`, dot: '#d2f5ff', stroke: '#aac8d8' }]
                : []),
            ];
            if (lines.length === 0) return null;
            const lineH = fsAnnot + 7;
            const pad = 9;
            const maxW = Math.max(...lines.map(l => l.text.length)) * fsAnnot * 0.54 + pad * 2 + 14;
            const boxH = lines.length * lineH + pad * 1.5;
            const bx = isMobile ? plotR - maxW - 10 : plotL + 10;
            const topLineY = Math.min(p0Y, expY0);
            const mobileTopY = (ipoWithin || (ipoMonth !== null && ipoMonth > 0)) ? plotT + 46 : plotT + 10;
            const mobileBottomY = plotB - boxH - 16;
            const profitableLabelY = bxWithin ? convFlowToY(exp0) + 20 : null;
            const profitableInLowerHalf = profitableLabelY && profitableLabelY > (plotT + plotB) / 2;
            const by = isMobile
              ? (bxWithin ? (profitableInLowerHalf ? mobileTopY : mobileBottomY) : mobileBottomY)
              : Math.max(plotT + 4, topLineY - boxH - 28);
            return (
              <g style={{ pointerEvents: 'none' }}>
                <rect x={bx - 2} y={by - 2} width={maxW + 4} height={boxH + 4}
                  fill="white" rx="7" stroke="#e5e7eb" strokeWidth={isMobile ? 1.5 : 1}
                  filter="url(#legendShadow)" />
                {lines.map((line, i) => (
                  <g key={i}>
                    <circle cx={bx + pad + 4} cy={by + pad + lineH * i + lineH / 2}
                      r={4} fill={line.dot} stroke={line.stroke} strokeWidth="1" />
                    <text x={bx + pad + 13} y={by + pad + lineH * i + lineH / 2}
                      fontSize={fsAnnot} fontFamily={font} fontWeight="bold" fill="#000" dominantBaseline="middle">
                      {line.text}
                    </text>
                  </g>
                ))}
              </g>
            );
          })()}
        </svg>
          {/* Mobile callout */}
          {isMobile && summaryText && (
            <div style={{ marginTop: '8px', textAlign: 'center', fontFamily: 'Artex, sans-serif',
              fontSize: '11px', color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
              {summaryText}
            </div>
          )}
        </div>
      );
    }

    // ─── Mobile view — verdict hero + sliders + simplified chart ─────────────────
    function MobileView({ rev0, exp0, growth, expGrowth, setRev0, setExp0, setGrowth, setExpGrowth,
        breakevenMonth, capitalNeeded, defaultAlive }) {

      const fmtMoney = v => {
        if (v >= 1e6) return '$' + Math.round(v / 1e6) + 'M';
        if (v >= 1e4) return '$' + (v / 1e3).toFixed(0) + 'k';
        if (v >= 1e3) return '$' + (v / 1e3).toFixed(1) + 'k';
        return '$' + Math.round(v);
      };

      const REV_MIN = 500, REV_MAX = 2000000;
      const EXP_MIN = 500, EXP_MAX = 2000000;
      const logToSlider = (v, min, max) => (Math.log(v / min) / Math.log(max / min)) * 1000;
      const sliderToLog = (s, min, max) => Math.round(min * Math.pow(max / min, s / 1000));
      const sliderBg = (pct, color) => ({ background: `linear-gradient(to right, ${color} ${pct.toFixed(1)}%, #e5e7eb ${pct.toFixed(1)}%)` });

      const alreadyProfitable = rev0 >= exp0;
      const neverBreakeven = breakevenMonth === null;
      const fmtCap = v => v >= 1e6 ? `$${(v/1e6).toFixed(1)}M` : `$${Math.round(v/1000)}k`;

      let verdictLevel;
      if (alreadyProfitable) {
        verdictLevel = 'green';
      } else if (neverBreakeven || breakevenMonth > 48 || capitalNeeded > 5_000_000) {
        verdictLevel = 'red';
      } else if (breakevenMonth <= 24 && capitalNeeded <= 750_000) {
        verdictLevel = 'green';
      } else {
        verdictLevel = 'yellow';
      }

      const verdictColor  = verdictLevel === 'green' ? '#16a34a' : verdictLevel === 'yellow' ? '#b45309' : '#dc2626';
      const verdictBg     = verdictLevel === 'green' ? '#f0fdf4' : verdictLevel === 'yellow' ? '#fffbeb' : '#fef2f2';
      const verdictBorder = verdictLevel === 'green' ? '#bbf7d0' : verdictLevel === 'yellow' ? '#fde68a' : '#fecaca';
      const verdictTag    = verdictLevel === 'green'
        ? (alreadyProfitable ? 'Profitable' : 'Default Alive')
        : verdictLevel === 'yellow' ? 'Needs Runway' : (neverBreakeven ? 'Default Dead' : 'Danger Zone');

      // $100M ARR milestone
      const hundredMARR = 100_000_000 / 12;
      const monthsTo100M = rev0 >= hundredMARR ? 0
        : growth > 0 ? Math.log(hundredMARR / Math.max(rev0, 1)) / Math.log(1 + growth) : null;
      const fmtMo = mo => mo < 12 ? `${Math.ceil(mo)} mo` : mo < 24 ? `${Math.floor(mo/12)}y ${Math.round(mo%12)}mo` : `${Math.round(mo/12)} yrs`;

      let headline = '', subline = '';
      if (alreadyProfitable) {
        if (monthsTo100M === 0) {
          headline = '$100M ARR — already there';
          subline  = `Growing at ${Math.round(growth * 100)}% per month`;
        } else if (monthsTo100M !== null) {
          headline = `$100M ARR in ${fmtMo(monthsTo100M)}`;
          subline  = `Profitable · growing at ${Math.round(growth * 100)}% / mo`;
        } else {
          headline = 'Profitable';
          subline  = `Growing at ${Math.round(growth * 100)}% per month`;
        }
      } else if (neverBreakeven) {
        headline = "Revenue won't catch expenses";
        subline  = 'Raise growth rate or cut costs';
      } else if (verdictLevel === 'green') {
        headline = `Profitable in ${Math.ceil(breakevenMonth)} months`;
        subline  = capitalNeeded > 0 ? `${fmtCap(capitalNeeded)} capital needed` : '';
      } else if (verdictLevel === 'yellow') {
        headline = `${Math.ceil(breakevenMonth)} months to profitability`;
        subline  = `${fmtCap(capitalNeeded)} runway needed — consider raising`;
      } else {
        headline = breakevenMonth > 48 ? `${Math.ceil(breakevenMonth)} months to break even` : "Revenue can't catch expenses";
        subline  = breakevenMonth > 48 ? `${fmtCap(capitalNeeded)} needed — requires major raise` : 'Cut costs or dramatically raise growth rate';
      }

      const pct     = Math.round(growth * 100);
      const revFill = logToSlider(rev0, REV_MIN, REV_MAX) / 10;
      const expFill = logToSlider(exp0, EXP_MIN, EXP_MAX) / 10;
      const gFill   = (pct - 1) / 49 * 100;

      return (
        <div style={{ fontFamily: 'Artex, system-ui, sans-serif', backgroundColor: '#fff' }}>

          {/* ── Chart — explicit CSS height ~2/3 of usable viewport ── */}
          <div style={{ height: window.innerWidth < 640 ? 'clamp(160px, calc(100dvh - 440px), 65vh)' : 'auto', borderBottom: '1px solid #f3f4f6', overflow: 'hidden' }}>
            <MobileSimpleChart rev0={rev0} exp0={exp0} expGrowth={expGrowth} growth={growth} breakevenMonth={breakevenMonth}
              onRev={setRev0} onExp={setExp0} onGrowth={setGrowth} />
          </div>

          {/* ── Sliders — compact single-line rows ── */}
          {(() => {
            const row = (label, value, valueColor, input) => (
              <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                <span style={{ fontSize: '10px', color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.05em', whiteSpace: 'nowrap', width: '56px', flexShrink: 0 }}>{label}</span>
                <div style={{ flex: 1 }}>{input}</div>
                <span style={{ fontSize: '13px', fontWeight: 700, color: valueColor, fontFamily: 'Feature Display, serif', whiteSpace: 'nowrap', width: '44px', textAlign: 'right', flexShrink: 0 }}>{value}</span>
              </div>
            );
            return (
              <div style={{ padding: '10px 16px 8px', display: 'flex', flexDirection: 'column', gap: '8px' }}>
                {row('Revenue', fmtMoney(rev0), '#b8cc1a',
                  <input type="range" className="m-slider s-rev" min="0" max="1000"
                    value={Math.round(logToSlider(rev0, REV_MIN, REV_MAX))}
                    onChange={e => setRev0(sliderToLog(Number(e.target.value), REV_MIN, REV_MAX))}
                    style={sliderBg(revFill, '#ebff52')} />
                )}
                {row('Expenses', fmtMoney(exp0), '#ff5252',
                  <input type="range" className="m-slider s-exp" min="0" max="1000"
                    value={Math.round(logToSlider(exp0, EXP_MIN, EXP_MAX))}
                    onChange={e => setExp0(sliderToLog(Number(e.target.value), EXP_MIN, EXP_MAX))}
                    style={sliderBg(expFill, '#ff5252')} />
                )}
                {row('Growth', `${pct}%`, '#111',
                  <input type="range" className="m-slider" min="1" max="50"
                    value={pct}
                    onChange={e => setGrowth(Number(e.target.value) / 100)}
                    style={sliderBg(gFill, '#111827')} />
                )}
              </div>
            );
          })()}

          {/* ── Result bar ── */}
          <div style={{ padding: '12px 20px 16px', background: verdictBg, borderTop: `1px solid ${verdictBorder}`, borderBottom: `1px solid ${verdictBorder}` }}>
            <div style={{ fontSize: '10px', fontWeight: 700, color: verdictColor, textTransform: 'uppercase', letterSpacing: '0.12em', marginBottom: '6px' }}>
              {verdictTag}
            </div>
            <div style={{ fontFamily: 'Feature Display, serif', fontSize: '24px', lineHeight: 1.15, color: '#111', marginBottom: subline ? '4px' : 0 }}>
              {headline}
            </div>
            {subline && <div style={{ fontSize: '13px', color: '#6b7280', lineHeight: 1.4 }}>{subline}</div>}
          </div>

        </div>
      );
    }

    // ─── App ──────────────────────────────────────────────────────────────────────

    function App() {
      const defaults = useMemo(() => {
        const p = new URLSearchParams(window.location.search);
        return {
          rev: Number(p.get('r')) || 10000,
          exp: Number(p.get('e')) || 50000,
          g:   Number(p.get('g')) || 0.10,
          eg:  Number(p.get('eg')) || 0,
        };
      }, []);

      const [rev0,      setRev0]      = useState(defaults.rev);
      const [exp0,      setExp0]      = useState(defaults.exp);
      const [growth,    setGrowth]    = useState(defaults.g);
      const [expGrowth, setExpGrowth] = useState(defaults.eg);
      const [showExact, setShowExact] = useState(false);
      const [scrolled,    setScrolled]    = useState(false);
      const [isMobile,    setIsMobile]    = useState(() => window.innerWidth < 640);
      const [useMobileUI, setUseMobileUI] = useState(() => window.innerWidth < 640);
      const [viewVisible, setViewVisible] = useState(true);

      const switchView = (toMobile) => {
        setViewVisible(false);
        setTimeout(() => { setUseMobileUI(toMobile); setViewVisible(true); }, 240);
      };

      useEffect(() => {
        const upd = () => setIsMobile(window.innerWidth < 640);
        window.addEventListener('resize', upd);
        return () => window.removeEventListener('resize', upd);
      }, []);

      useEffect(() => {
        const onScroll = () => {
          const nearBottom = window.scrollY + window.innerHeight > document.documentElement.scrollHeight - 200;
          setScrolled(nearBottom);
        };
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      // Debounced URL update — Safari caps history.replaceState at ~100/30s
      useEffect(() => {
        const t = setTimeout(() => {
          const p = new URLSearchParams({ r: Math.round(rev0), e: Math.round(exp0), g: growth.toFixed(4), eg: expGrowth.toFixed(4) });
          window.history.replaceState(null, '', '?' + p.toString());
        }, 800);
        return () => clearTimeout(t);
      }, [rev0, exp0, growth, expGrowth]);

      const g = growth;
      const breakevenMonth = useMemo(() => rev0 >= exp0 ? 0
        : (g > expGrowth)
          ? Math.log(exp0 / rev0) / Math.log((1 + g) / (1 + expGrowth))
          : null
      , [rev0, exp0, g, expGrowth]);

      const capitalNeeded = useMemo(() => {
        if (breakevenMonth === null || breakevenMonth <= 0) return 0;
        let total = 0;
        const steps = 80;
        for (let i = 0; i < steps; i++) {
          const mo = (breakevenMonth / steps) * (i + 0.5);
          total += Math.max(0, exp0 * Math.pow(1 + expGrowth, mo) - rev0 * Math.pow(1 + g, mo)) * (breakevenMonth / steps);
        }
        return total;
      }, [breakevenMonth, rev0, exp0, g, expGrowth]);

      const defaultAlive = breakevenMonth !== null;
      const fmt = n => n >= 1e6 ? `$${Math.round(n/1e6)}M` : n >= 1000 ? `$${Math.round(n/1000)}k` : `$${Math.round(n)}`;



      // Milestones data
      const MILESTONES = [
        { name: 'Wealthsimple', arr: 500_000_000, arrLabel: '~$500M run rate', logo: 'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTcDAp_72xcznmkFbk2lOe3KIvPlnRD_1SdiA&s' },
        { name: 'Shopify', arr: 8_900_000_000, logo: 'https://cdn.simpleicons.org/shopify' },
        { name: 'Stripe', arr: 15_000_000_000, logo: 'https://cdn.simpleicons.org/stripe' },
        { name: 'Apple', arr: 391_000_000_000, logo: 'https://cdn.simpleicons.org/apple' },
      ];

      const fmtRevenue = v => {
        if (v >= 1e9) return `$${(v/1e9).toFixed(0)}B run rate`;
        if (v >= 1e6) return `$${(v/1e6).toFixed(0)}M run rate`;
        return `$${(v/1e3).toFixed(0)}k run rate`;
      };

      const fmtTimeLong = mo => {
        if (mo < 1) return 'now';
        if (mo < 12) return `${Math.ceil(mo)} month${Math.ceil(mo) === 1 ? '' : 's'}`;
        const totalMonths = Math.round(mo);
        const yrs = Math.floor(totalMonths / 12);
        const mos = totalMonths % 12;
        if (mos === 0) return `${yrs} year${yrs === 1 ? '' : 's'}`;
        return `${yrs} year${yrs === 1 ? '' : 's'} ${mos} month${mos === 1 ? '' : 's'}`;
      };
      const fmtTimeShort = mo => {
        if (mo < 1) return 'now';
        if (mo < 12) return `${Math.ceil(mo)} months`;
        return `${Math.round(mo / 12)} years`;
      };

      const milestoneMonths = MILESTONES.map(m => {
        const targetMonthly = m.arr / 12;
        if (rev0 >= targetMonthly) return 0; // already passed
        if (growth <= 0) return null; // never
        return Math.log(targetMonthly / rev0) / Math.log(1 + growth);
      });

      return (
        <div style={{ backgroundColor: '#fff', fontFamily: 'Artex, system-ui, sans-serif' }}>

          {/* ── Persistent: header + controls (never transitions) ── */}
          <div className="max-w-5xl mx-auto">
            <div className="px-4" style={{ marginBottom: '0', marginTop: '20px' }}>
              <h1 style={{ fontFamily: 'Feature Display, serif', fontSize: '28px', fontWeight: 'normal', margin: '0 0 10px 0', lineHeight: 1.1 }}>
                Startup Growth Calculator
              </h1>
              <p style={{ fontSize: '12px', color: '#9ca3af', margin: 0, lineHeight: 1.6 }}>
                Inspired by <a href="https://growth.tlb.org/" target="_blank" rel="noopener noreferrer" style={{ color: 'inherit', textDecoration: 'underline' }}>Trevor Blackwell's calculator</a> and <a href="https://www.paulgraham.com/aord.html" target="_blank" rel="noopener noreferrer" style={{ color: 'inherit', textDecoration: 'underline' }}>Paul Graham's essay</a>. Modernized for founders by TechTO.
              </p>
            </div>
            <div className="exact-numbers-wrap" style={{ marginTop: '8px' }}>
              <div style={{ display: 'flex', justifyContent: 'space-between', paddingRight: 'calc(20 / 900 * 100%)' }}>
                <span onClick={e => { e.stopPropagation(); setShowExact(s => !s); }}
                    style={{ fontSize: '11px', color: '#9ca3af', cursor: 'pointer', textDecoration: 'underline' }}>
                    {showExact ? 'hide exact numbers' : 'enter exact numbers'}
                  </span>
                <div style={{ display: 'flex', gap: '12px' }}>
                  <span onClick={e => { e.stopPropagation(); switchView(!useMobileUI); }}
                    style={{ fontSize: '11px', color: '#9ca3af', cursor: 'pointer', textDecoration: 'underline' }}>
                    {useMobileUI ? 'desktop' : 'mobile'}
                  </span>
                  <span onClick={e => { e.stopPropagation(); setRev0(10000); setExp0(50000); setGrowth(0.10); setExpGrowth(0); }}
                    style={{ fontSize: '11px', color: '#9ca3af', cursor: 'pointer', textDecoration: 'underline' }}>
                    reset
                  </span>
                </div>
              </div>
              {/* Exact number drawer — desktop only */}
              {showExact && (() => {
                const parseMoney = s => {
                  s = s.replace(/[$,\s]/g, '').toLowerCase();
                  if (s.endsWith('k')) return parseFloat(s) * 1000;
                  if (s.endsWith('m')) return parseFloat(s) * 1000000;
                  return parseFloat(s);
                };
                const fieldStyle = { width: '120px', fontSize: '16px', padding: '3px 6px', border: '1px solid #e5e7eb', borderRadius: '5px', textAlign: 'right', fontFamily: 'Artex, sans-serif', outline: 'none' };
                const labelStyle = { fontSize: '10px', color: '#9ca3af', textTransform: 'uppercase', letterSpacing: '0.06em', display: 'block', marginBottom: '2px' };
                const adornStyle = { position: 'absolute', top: '50%', transform: 'translateY(-50%)', fontSize: '16px', color: '#374151', pointerEvents: 'none', fontFamily: 'Artex, sans-serif' };
                const fmtNum = n => Math.round(n).toLocaleString('en-CA');
                const filterNum = e => { e.target.value = e.target.value.replace(/[^0-9.]/g, ''); };
                return (
                  <div style={{ display: 'flex', gap: '16px', marginTop: '8px', alignItems: 'flex-end', flexWrap: 'wrap', paddingTop: '8px', borderTop: '1px solid #f3f4f6' }}>
                    <div>
                      <span style={labelStyle}>Revenue per month</span>
                      <div style={{ position: 'relative', display: 'inline-block' }}>
                        <span style={{ ...adornStyle, left: '6px' }}>$</span>
                        <input key={'r'+rev0} type="text" defaultValue={fmtNum(rev0)}
                          onFocus={e => { e.target.select(); }}
                          onChange={filterNum}
                          onBlur={e => { const v = parseMoney(e.target.value); if (!isNaN(v) && v > 0) setRev0(v); else e.target.value = fmtNum(rev0); }}
                          onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                          style={{ ...fieldStyle, paddingLeft: '18px' }} />
                      </div>
                    </div>
                    <div>
                      <span style={labelStyle}>Expenses per month</span>
                      <div style={{ position: 'relative', display: 'inline-block' }}>
                        <span style={{ ...adornStyle, left: '6px' }}>$</span>
                        <input key={'e'+exp0} type="text" defaultValue={fmtNum(exp0)}
                          onFocus={e => { e.target.select(); }}
                          onChange={filterNum}
                          onBlur={e => { const v = parseMoney(e.target.value); if (!isNaN(v) && v > 0) setExp0(v); else e.target.value = fmtNum(exp0); }}
                          onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                          style={{ ...fieldStyle, paddingLeft: '18px' }} />
                      </div>
                    </div>
                    <div>
                      <span style={labelStyle}>Expense growth per month</span>
                      <div style={{ position: 'relative', display: 'inline-block' }}>
                        <input key={'eg'+expGrowth} type="text" defaultValue={Math.round(expGrowth * 100)}
                          onFocus={e => { e.target.select(); }}
                          onChange={filterNum}
                          onBlur={e => { const v = parseFloat(e.target.value); if (!isNaN(v) && v >= 0) setExpGrowth(Math.min(v / 100, 0.50)); else e.target.value = Math.round(expGrowth * 100); }}
                          onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                          style={{ ...fieldStyle, paddingRight: '22px' }} />
                        <span style={{ ...adornStyle, right: '6px' }}>%</span>
                      </div>
                    </div>
                    <div>
                      <span style={labelStyle}>Revenue growth per month</span>
                      <div style={{ position: 'relative', display: 'inline-block' }}>
                        <input key={'g'+growth} type="text" defaultValue={Math.round(growth * 100)}
                          onFocus={e => { e.target.select(); }}
                          onChange={filterNum}
                          onBlur={e => { const v = parseFloat(e.target.value); if (!isNaN(v) && v >= 0) setGrowth(Math.min(v / 100, 0.70)); else e.target.value = Math.round(growth * 100); }}
                          onKeyDown={e => e.key === 'Enter' && e.target.blur()}
                          style={{ ...fieldStyle, paddingRight: '22px' }} />
                        <span style={{ ...adornStyle, right: '6px' }}>%</span>
                      </div>
                    </div>
                  </div>
                );
              })()}
            </div>
          </div>

          {/* ── Transitioning view ── */}
          <div className={`view-wrap${viewVisible ? '' : ' view-hidden'}`}>
          <main className="max-w-5xl mx-auto pt-2 pb-3" style={{ paddingBottom: '240px' }}>

            {useMobileUI ? (
              <MobileView
                rev0={rev0} exp0={exp0} growth={growth} expGrowth={expGrowth}
                setRev0={setRev0} setExp0={setExp0} setGrowth={setGrowth} setExpGrowth={setExpGrowth}
                breakevenMonth={breakevenMonth} capitalNeeded={capitalNeeded} defaultAlive={defaultAlive} />
            ) : (
              <div className="fadein-1 px-3 md:px-0">
                <GrowthChart rev0={rev0} exp0={exp0} expGrowth={expGrowth} growth={growth}
                  onRev={setRev0} onExp={setExp0} onGrowth={setGrowth}
                  capitalNeeded={capitalNeeded}
                  summaryText={
                    defaultAlive && breakevenMonth > 0
                      ? `Profitable in ${Math.ceil(breakevenMonth)} months at ${Math.round(growth * 100)}% growth · ${fmt(capitalNeeded)} needed`
                      : defaultAlive && breakevenMonth === 0
                      ? `Already profitable at ${Math.round(growth * 100)}% monthly growth`
                      : `Costs growing faster than revenue — no profitability`
                  } />
              </div>
            )}

            {/* ── Desktop results banner ── */}
            {!useMobileUI && (() => {
              const alreadyProfitable = rev0 >= exp0;
              const neverBreakeven = breakevenMonth === null;
              const fmtCap = v => v >= 1e6 ? `$${(v/1e6).toFixed(1)}M` : `$${Math.round(v/1000)}k`;
              const hundredMARR = 100_000_000 / 12;
              const monthsTo100M = rev0 >= hundredMARR ? 0 : growth > 0 ? Math.log(hundredMARR / Math.max(rev0, 1)) / Math.log(1 + growth) : null;
              const fmtMo = mo => mo < 12 ? `${Math.ceil(mo)} mo` : mo < 24 ? `${Math.floor(mo/12)}y ${Math.round(mo%12)}mo` : `${Math.round(mo/12)} yrs`;

              let verdictLevel;
              if (alreadyProfitable) verdictLevel = 'green';
              else if (neverBreakeven || breakevenMonth > 48 || capitalNeeded > 5_000_000) verdictLevel = 'red';
              else if (breakevenMonth <= 24 && capitalNeeded <= 750_000) verdictLevel = 'green';
              else verdictLevel = 'yellow';

              const color  = verdictLevel === 'green' ? '#16a34a' : verdictLevel === 'yellow' ? '#b45309' : '#dc2626';
              const bg     = verdictLevel === 'green' ? '#f0fdf4' : verdictLevel === 'yellow' ? '#fffbeb' : '#fef2f2';
              const border = verdictLevel === 'green' ? '#bbf7d0' : verdictLevel === 'yellow' ? '#fde68a' : '#fecaca';
              const tag    = verdictLevel === 'green' ? (alreadyProfitable ? 'Profitable' : 'Default Alive') : verdictLevel === 'yellow' ? 'Needs Runway' : (neverBreakeven ? 'Default Dead' : 'Danger Zone');

              let headline = '', subline = '';
              if (alreadyProfitable) {
                if (monthsTo100M === 0) { headline = '$100M ARR — already there'; subline = `Growing at ${Math.round(growth * 100)}% per month`; }
                else if (monthsTo100M !== null) { headline = `$100M ARR in ${fmtMo(monthsTo100M)}`; subline = `Profitable · growing at ${Math.round(growth * 100)}% / mo`; }
                else { headline = 'Profitable'; subline = `Growing at ${Math.round(growth * 100)}% per month`; }
              } else if (neverBreakeven) {
                headline = "Revenue won't catch expenses"; subline = 'Raise growth rate or cut costs';
              } else if (verdictLevel === 'green') {
                headline = `Profitable in ${Math.ceil(breakevenMonth)} months`; subline = capitalNeeded > 0 ? `${fmtCap(capitalNeeded)} capital needed` : '';
              } else if (verdictLevel === 'yellow') {
                headline = `${Math.ceil(breakevenMonth)} months to profitability`; subline = `${fmtCap(capitalNeeded)} runway needed — consider raising`;
              } else {
                headline = breakevenMonth > 48 ? `${Math.ceil(breakevenMonth)} months to break even` : "Revenue can't catch expenses";
                subline  = breakevenMonth > 48 ? `${fmtCap(capitalNeeded)} needed — requires major raise` : 'Cut costs or dramatically raise growth rate';
              }

              return (
                <div style={{ margin: '12px 0 0', padding: '16px 24px 20px', background: bg, borderTop: `1px solid ${border}`, borderBottom: `1px solid ${border}` }}>
                  <div style={{ fontSize: '10px', fontWeight: 700, color, textTransform: 'uppercase', letterSpacing: '0.12em', marginBottom: '6px' }}>{tag}</div>
                  <div style={{ fontFamily: 'Feature Display, serif', fontSize: '28px', lineHeight: 1.15, color: '#111', marginBottom: subline ? '6px' : 0 }}>{headline}</div>
                  {subline && <div style={{ fontSize: '14px', color: '#6b7280' }}>{subline}</div>}
                </div>
              );
            })()}

            <div className="px-4" style={{ borderTop: useMobileUI ? '4px solid #f3f4f6' : 'none', paddingTop: useMobileUI ? '20px' : 0 }}>
            {/* Milestones Panel */}
            <div style={{ marginBottom: '20px', marginTop: '16px' }}>
              <p style={{ fontSize: '12px', color: '#9ca3af', marginBottom: '12px', textTransform: 'uppercase', letterSpacing: '0.08em' }}>
                At your current growth rate, here's when you'll hit milestones.
              </p>

              {/* Generic milestones row */}
              {(() => {
                const genericMilestones = [
                  { label: 'Default Alive', desc: 'reach profitability', arr: null },
                  { label: '$1M run rate', desc: 'first million', arr: 1_000_000 },
                  { label: '$10M run rate', desc: 'real traction', arr: 10_000_000 },
                  { label: '$100M run rate', desc: 'category leader', arr: 100_000_000 },
                ];
                const moForGeneric = genericMilestones.map(m => {
                  if (m.arr === null) return breakevenMonth;
                  const target = m.arr / 12;
                  if (rev0 >= target) return 0;
                  if (growth <= 0) return null;
                  return Math.log(target / rev0) / Math.log(1 + growth);
                });
                return (
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                    {genericMilestones.map((m, i) => {
                      const mo = moForGeneric[i];
                      const passed = mo === 0;
                      const never = mo === null;
                      return (
                        <div key={i} style={{
                          border: `1.5px solid ${passed ? '#22c55e' : '#e5e7eb'}`,
                          borderRadius: '10px',
                          padding: '14px 16px',
                          background: passed ? '#f0fdf4' : '#fff',
                          position: 'relative',
                          overflow: 'hidden',
                          display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
                          minHeight: '130px',
                        }}>
                          {passed && (
                            <div style={{
                              position: 'absolute', top: '8px', right: '10px',
                              fontSize: '11px', fontWeight: 'bold', color: '#16a34a',
                            }}>✓ Passed</div>
                          )}
                          <div>
                            <div style={{ fontSize: '13px', fontWeight: 'bold', color: '#111', lineHeight: 1.2 }}>
                              {m.label}
                            </div>
                            <div style={{ fontSize: '12px', color: '#6b7280', marginTop: '2px' }}>{m.desc}</div>
                          </div>
                          <div style={{ fontSize: '18px', fontWeight: 'bold', fontFamily: 'Feature Display, serif', color: passed ? '#16a34a' : never ? '#9ca3af' : '#111', marginTop: '10px' }}>
                            {passed ? 'Already here' : never ? 'Never' : fmtTimeLong(mo)}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                );
              })()}

              {/* Company milestones */}
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                {MILESTONES.map((m, i) => {
                  const mo = milestoneMonths[i];
                  const passed = mo === 0;
                  const never = mo === null;
                  return (
                    <div key={i} style={{
                      border: `1.5px solid ${passed ? '#22c55e' : '#e5e7eb'}`,
                      borderRadius: '10px',
                      padding: '14px 16px',
                      background: passed ? '#f0fdf4' : '#fff',
                      position: 'relative',
                      overflow: 'hidden',
                      display: 'flex', flexDirection: 'column', justifyContent: 'space-between',
                      minHeight: '130px',
                    }}>
                      {passed && (
                        <div style={{
                          position: 'absolute', top: '8px', right: '10px',
                          fontSize: '11px', fontWeight: 'bold', color: '#16a34a',
                        }}>✓ Passed</div>
                      )}
                      <img
                        src={m.logo}
                        alt={m.name}
                        style={{ width: '24px', height: '24px', objectFit: 'contain', filter: passed ? 'none' : 'grayscale(100%)', marginBottom: '8px', display: 'block' }}
                        onError={e => { e.target.style.display = 'none'; }}
                      />
                      <div style={{ fontSize: '13px', fontWeight: 'bold', color: '#111', lineHeight: 1.2 }}>
                        {m.name}
                      </div>
                      <div style={{ fontSize: '12px', color: '#6b7280', marginTop: '2px' }}>{m.arrLabel || fmtRevenue(m.arr)}</div>
                      <div style={{
                        marginTop: '10px',
                        fontSize: '18px',
                        fontWeight: 'bold',
                        fontFamily: 'Feature Display, serif',
                        color: passed ? '#16a34a' : never ? '#9ca3af' : '#111',
                      }}>
                        {passed ? 'Already here' : never ? 'Never' : fmtTimeShort(mo)}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            </div>{/* end px-4 wrapper */}

          </main>

          {/* Fixed bottom dock — desktop always, mobile when scrolled */}
          <div className={scrolled ? 'block' : 'hidden md:block'} style={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 10, background: '#fff' }}>
            <div className="fadein-6 padding-global">
              <div className="container-large">
                <div className="padding-bottom padding-medium">
                  <div className="cta8_component">
                    <div className="cta8_content">
                      <div className="text-size-large">Meet leaders, share ideas, and connect with people who can open new doors.</div>
                    </div>
                    <a href="https://techto.org/events" className="button is-secondary w-button">See Upcoming Events</a>
                  </div>
                </div>
              </div>
            </div>
            <div style={{
              height: '60px',
              backgroundImage: "url('https://cdn.prod.website-files.com/66f1864b4a6f3045a6a2ca3e/66f4193346a254b2220786a2_Grid.svg')",
              backgroundPosition: '50% 0', backgroundRepeat: 'no-repeat', backgroundSize: 'cover',
            }} />
          </div>
          </div>{/* end view-wrap */}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  <!-- webflow.js removed: was intercepting all click events and routing them to techto.org -->
  <script>
    (function () {
      const chars = 'abcdefghijklmnopqrstuvwxyz';
      const initialized = new WeakSet();
      function addScramble(btn) {
        if (initialized.has(btn)) return;
        initialized.add(btn);
        let frame, running = false, original = '';
        btn.addEventListener('mouseenter', () => {
          original = btn.textContent.trim();
          if (running) cancelAnimationFrame(frame);
          running = true;
          const start = performance.now(), duration = 300;
          (function tick(now) {
            const t = Math.min((now - start) / duration, 1);
            const resolved = Math.floor(t * original.length);
            btn.textContent = original.split('').map((c, i) =>
              c === ' ' ? ' ' : i < resolved ? c : chars[Math.floor(Math.random() * chars.length)]
            ).join('');
            if (t < 1) { frame = requestAnimationFrame(tick); }
            else { btn.textContent = original; running = false; }
          })(performance.now());
        });
        btn.addEventListener('mouseleave', () => {
          if (running) { cancelAnimationFrame(frame); btn.textContent = original; running = false; }
        });
      }
      function init() { document.querySelectorAll('.button').forEach(addScramble); }
      init();
      new MutationObserver(init).observe(document.body, { childList: true, subtree: true });
    })();

    // Mobile nav toggle (replaces webflow.js behaviour)
    (function () {
      const btn     = document.querySelector('.w-nav-button');
      const wrapper = document.querySelector('.navbar2_button-wrapper');
      const menu    = document.querySelector('.w-nav-menu');
      if (!btn || !menu || !wrapper) return;

      function open() {
        btn.classList.add('w--open');
        menu.setAttribute('data-nav-menu-open', '');
        // Pull wrapper out of stacking context by making it fixed
        const r = wrapper.getBoundingClientRect();
        Object.assign(wrapper.style, {
          position: 'fixed', top: r.top + 'px', right: (window.innerWidth - r.right) + 'px', zIndex: '99999999'
        });
      }
      function close() {
        btn.classList.remove('w--open');
        menu.removeAttribute('data-nav-menu-open');
        Object.assign(wrapper.style, { position: '', top: '', right: '', zIndex: '' });
      }

      btn.addEventListener('click', function () {
        btn.classList.contains('w--open') ? close() : open();
      });
      document.addEventListener('click', function (e) {
        if (btn.classList.contains('w--open') && !btn.contains(e.target) && !menu.contains(e.target)) close();
      });
    })();
  </script>
</body>
